<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Viewer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Highlight.js -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root{
      --bg: #0f1115;
      --bg-secondary: #14171d;
      --surface: rgba(22, 25, 32, 0.74);
      --surface-solid: #171a21;
      --border: rgba(255,255,255,0.08);

      --text: rgba(255,255,255,0.88);
      --text-secondary: rgba(255,255,255,0.58);

      --shadow:
        0 10px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.03);

      --radius: 24px;

      --accent: #8d95a5;
      --accent-soft: rgba(141,149,165,0.14);

      --success: #b6c4c0;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 30%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:60px;
    }

    body.light{
      --bg:#f3f4f7;
      --bg-secondary:#ffffff;
      --surface:rgba(255,255,255,0.7);
      --surface-solid:#ffffff;
      --border:rgba(0,0,0,0.08);

      --text:rgba(0,0,0,0.88);
      --text-secondary:rgba(0,0,0,0.58);

      --shadow:
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.5);

      background:
        radial-gradient(circle at top left, rgba(0,0,0,0.04), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,0,0,0.03), transparent 30%),
        var(--bg);
    }

    .background-glow{
      position:fixed;
      width:500px;
      height:500px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
      filter:blur(80px);
      top:-150px;
      right:-120px;
      pointer-events:none;
      z-index:0;
    }

    .container{
      width:min(1200px, calc(100% - 32px));
      margin:auto;
      position:relative;
      z-index:2;
    }

    /* Header */

    .header{
      position:sticky;
      top:18px;
      z-index:50;
      margin-top:18px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:16px 22px;

      border:1px solid var(--border);
      background:rgba(20,22,28,0.65);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);

      border-radius:22px;
      box-shadow:var(--shadow);

      animation:fadeUp .7s ease;
    }

    body.light .header{
      background:rgba(255,255,255,0.65);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:600;
      letter-spacing:-0.4px;
    }

    .logo-dot{
      width:11px;
      height:11px;
      border-radius:50%;
      background:#9ca3af;
      box-shadow:0 0 20px rgba(255,255,255,0.2);
    }

    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;

      padding:11px 15px;
      border-radius:16px;

      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);

      color:var(--text);
      font-size:14px;
      font-family:inherit;

      transition:
        transform .25s ease,
        background .25s ease,
        border .25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.07);
    }

    /* Hero */

    .hero{
      margin-top:32px;

      background:var(--surface);
      border:1px solid var(--border);

      border-radius:var(--radius);
      padding:30px;

      box-shadow:var(--shadow);

      animation:fadeUp .9s ease;
    }

    .paste-title{
      font-size:34px;
      font-weight:700;
      letter-spacing:-1px;
      margin-bottom:18px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:18px;
    }

    .meta-card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .meta-label{
      color:var(--text-secondary);
      font-size:13px;
      margin-bottom:8px;
    }

    .meta-value{
      font-size:15px;
      font-weight:500;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;

      padding:8px 12px;
      border-radius:999px;

      background:var(--accent-soft);
      border:1px solid rgba(255,255,255,0.08);

      width:fit-content;
    }

    .badge-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#c4c7d0;
    }

    /* Code Section */

    .code-wrapper{
      margin-top:28px;

      background:var(--surface);
      border:1px solid var(--border);
      border-radius:28px;

      overflow:hidden;
      box-shadow:var(--shadow);

      animation:fadeUp 1.1s ease;
    }

    .code-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:18px 22px;

      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,0.02);

      flex-wrap:wrap;
      gap:12px;
    }

    .toolbar-left{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--text-secondary);
      font-size:14px;
    }

    .toolbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .code-container{
      overflow:auto;
      position:relative;
    }

    pre{
      margin:0;
      padding:28px !important;
      min-width:max-content;
      background:transparent !important;
    }

    code{
      font-family:"JetBrains Mono", monospace !important;
      font-size:14px;
      line-height:1.75;
    }

    /* Custom scrollbar */

    ::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,0.1);
      border-radius:999px;
    }

    ::-webkit-scrollbar-track{
      background:transparent;
    }

    /* Loading Skeleton */

    .skeleton{
      padding:30px;
      display:grid;
      gap:16px;
    }

    .skeleton-line{
      height:16px;
      border-radius:999px;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 25%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.03) 75%
        );
      background-size:200% 100%;
      animation:shimmer 2s infinite linear;
    }

    .skeleton-line:nth-child(1){ width:80%; }
    .skeleton-line:nth-child(2){ width:92%; }
    .skeleton-line:nth-child(3){ width:70%; }
    .skeleton-line:nth-child(4){ width:88%; }

    /* Tooltip */

    .tooltip{
      position:fixed;
      top:24px;
      right:24px;

      padding:12px 16px;
      border-radius:16px;

      background:rgba(22,24,30,0.95);
      border:1px solid var(--border);

      color:var(--success);
      font-size:14px;

      opacity:0;
      transform:translateY(10px);

      pointer-events:none;

      transition:all .35s ease;
      z-index:999;
    }

    .tooltip.show{
      opacity:1;
      transform:translateY(0);
    }

    /* Highlight.js overrides */

    .hljs{
      color:#d7dce2;
      background:transparent;
    }

    .hljs-comment{
      color:#7b8190;
      font-style:italic;
    }

    .hljs-keyword,
    .hljs-selector-tag{
      color:#b6bdd0;
    }

    .hljs-string{
      color:#c6d0d7;
    }

    .hljs-function,
    .hljs-title{
      color:#d3d9e4;
    }

    .hljs-number,
    .hljs-literal{
      color:#b8c7d1;
    }

    .hljs-params{
      color:#aab4bf;
    }

    /* Responsive */

    @media(max-width:768px){

      .header{
        padding:14px 16px;
      }

      .hero{
        padding:22px;
      }

      .paste-title{
        font-size:26px;
      }

      .code-toolbar{
        padding:16px;
      }

      pre{
        padding:22px !important;
      }

      .toolbar-actions{
        width:100%;
      }

      .toolbar-actions .btn{
        flex:1;
      }
    }

    @media(max-width:520px){

      .header{
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
      }

      .header-actions{
        width:100%;
        flex-wrap:wrap;
      }

      .header-actions .btn{
        flex:1;
      }
    }

    /* Animations */

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(18px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes shimmer{
      from{
        background-position:200% 0;
      }
      to{
        background-position:-200% 0;
      }
    }
  </style>
</head>

<body>

<!-- HEADER ACTIONS -->
<div class="header-actions">
  <button class="btn" id="themeToggle">Theme</button>
  <button class="btn">Share</button>
</div>


<!-- HERO -->
<section class="hero">

  <h1 class="paste-title" id="pasteTitle"></h1>

  <div class="meta-grid">

    <div class="meta-card">
      <div class="meta-label">Created</div>
      <div class="meta-value" id="createdAt"></div>
    </div>

    <div class="meta-card">
      <div class="meta-label">Expiration</div>
      <div class="meta-value" id="expiration"></div>
    </div>

    <div class="meta-card">
      <div class="meta-label">Paste ID</div>
      <div class="meta-value" id="pasteId"></div>
    </div>



 

</section>


<!-- CODE WRAPPER -->
<section class="code-wrapper">

  <div class="code-toolbar">

    <div class="toolbar-left">

      <span id="fileName"></span>

      <span>•</span>

      <span id="lineCount"></span>

    </div>

    <div class="toolbar-actions">

      <button class="btn" id="copyBtn">
        Copy
      </button>

      <button class="btn">
        Raw View
      </button>

    </div>

  </div>

  <!-- SHIMMER -->
  <div class="skeleton" id="skeleton">

    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>

  </div>

  <!-- CODE -->
  <div
    class="code-container"
    id="codeContainer"
    style="display:none;"
  >

<pre><code
class="language-plaintext"
id="codeBlock"
></code></pre>

  </div>

</section>



<script>

  // THEME TOGGLE

  document
    .getElementById("themeToggle")
    .addEventListener("click", () => {

      document.body.classList.toggle("light")

    })



  // GET PASTE ID

  const params =
    new URLSearchParams(window.location.search)

  const pasteId =
    params.get("id")



  // ELEMENTS

  const pasteTitle =
    document.getElementById("pasteTitle")

  const createdAt =
    document.getElementById("createdAt")

  const expiration =
    document.getElementById("expiration")

  const pasteIdEl =
    document.getElementById("pasteId")

  
  const fileName =
    document.getElementById("fileName")

  const lineCount =
    document.getElementById("lineCount")

  const codeBlock =
    document.getElementById("codeBlock")

  const skeleton =
    document.getElementById("skeleton")

  const codeContainer =
    document.getElementById("codeContainer")



  // LOAD PASTE

  async function loadPaste(){

    try{

      const response = await fetch(
        `https://pastedb.onrender.com/paste/${pasteId}`
      )

      const data = await response.json()



      // TITLE

      pasteTitle.textContent =
        data.title || "Untitled Paste"



      // META

      createdAt.textContent =
        data.created_at || "Unknown"

      expiration.textContent =
        data.expiration || "Never"

      pasteIdEl.textContent =
        pasteId

      


      // CODE

      codeBlock.textContent =
        data.content || ""



      // LANGUAGE

      const language =
        data.syntax || "plaintext"



      // FILE EXTENSION

      const extensions = {

        python: "py",

        javascript: "js",

        html: "html",

        css: "css",

        json: "json",

        java: "java"

      }

      const ext =
        extensions[language] || "txt"



      fileName.textContent =
        `main.${ext}`



      // LINE COUNT

      const totalLines =
        codeBlock.textContent
          .split("\n")
          .length

      lineCount.textContent =
        `${totalLines} lines`



      // SYNTAX HIGHLIGHT

      codeBlock.className =
        `language-${language}`

      hljs.highlightElement(codeBlock)



      // SHOW CODE

      skeleton.style.display = "none"

      codeContainer.style.display = "block"



    }

    catch(err){

      console.log(err)

    }

  }



  loadPaste()



  // COPY

  function copyCode(){

    navigator.clipboard.writeText(
      codeBlock.innerText
    )

    const tooltip =
      document.getElementById("tooltip")

    tooltip.classList.add("show")

    setTimeout(() => {

      tooltip.classList.remove("show")

    }, 2000)

  }



  document
    .getElementById("copyBtn")
    .addEventListener("click", copyCode)

</script>
  

</body>
  </html>
