<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>View Paste</title>

  <style>

    body{
      background:#f5f5f5;
      font-family:Arial;
      padding:40px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    h1{
      margin-bottom:10px;
    }

    .meta{
      color:gray;
      margin-bottom:25px;
    }

    pre{
      background:#111;
      color:#eee;
      padding:20px;
      border-radius:14px;
      overflow:auto;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="card">

    <h1 id="title">Loading...</h1>

    <div class="meta" id="meta"></div>

    <pre id="content"></pre>

  </div>

</div>

<script>

async function loadPaste(){

  const params = new URLSearchParams(
    window.location.search
  )

  const id = params.get("id")

  if(!id){
    alert("No paste ID found")
    return
  }

  try{

    const response = await fetch(
      `https://pastedb.onrender.com/paste/${id}`
    )

    const data = await response.json()

    document.getElementById("title")
      .textContent = data.title

    document.getElementById("meta")
      .textContent =
        `Syntax: ${data.syntax}`

    document.getElementById("content")
      .textContent = data.content

  }

  catch(err){

    console.log(err)

    alert("Could not load paste")

  }

}

loadPaste()

</script>

</body>
</html>
