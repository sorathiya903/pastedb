<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Viewer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Highlight.js -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root{
      --bg: #0f1115;
      --bg-secondary: #14171d;
      --surface: rgba(22, 25, 32, 0.74);
      --surface-solid: #171a21;
      --border: rgba(255,255,255,0.08);

      --text: rgba(255,255,255,0.88);
      --text-secondary: rgba(255,255,255,0.58);

      --shadow:
        0 10px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.03);

      --radius: 24px;

      --accent: #8d95a5;
      --accent-soft: rgba(141,149,165,0.14);

      --success: #b6c4c0;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 30%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:60px;padding:20px
    }

    body.light{
      --bg:#f3f4f7;
      --bg-secondary:#ffffff;
      --surface:rgba(255,255,255,0.7);
      --surface-solid:#ffffff;
      --border:rgba(0,0,0,0.08);

      --text:rgba(0,0,0,0.88);
      --text-secondary:rgba(0,0,0,0.58);

      --shadow:
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.5);

      background:
        radial-gradient(circle at top left, rgba(0,0,0,0.04), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,0,0,0.03), transparent 30%),
        var(--bg);
    }

    .background-glow{
      position:fixed;
      width:500px;
      height:500px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
      filter:blur(80px);
      top:-150px;
      right:-120px;
      pointer-events:none;
      z-index:0;
    }

    .container{
      width:min(1200px, calc(100% - 32px));
      margin:auto;
      position:relative;
      z-index:2;
    }

    /* Header */

    .header{
      position:sticky;
      top:18px;
      z-index:50;
      margin-top:28px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:16px 22px;

      border:1px solid var(--border);
      background:rgba(20,22,28,0.65);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);

      border-radius:22px;
      box-shadow:var(--shadow);

      animation:fadeUp .7s ease;
    }

    body.light .header{
      background:rgba(255,255,255,0.65);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:600;
      letter-spacing:-0.4px;
    }

    .logo-dot{
      width:11px;
      height:11px;
      border-radius:50%;
      background:#9ca3af;
      box-shadow:0 0 20px rgba(255,255,255,0.2);
    }

    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .theme, .btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:11px 15px;
      border-radius:16px;

      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);

      color:var(--text);
      font-size:14px;
      font-family:inherit;

      transition:
        transform .25s ease,
        background .25s ease,
        border .25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.07);
    }

    /* Hero */

    .hero{
      margin-top:32px;

      background:var(--surface);
      border:1px solid var(--border);

      border-radius:var(--radius);
      padding:30px;

      box-shadow:var(--shadow);

      animation:fadeUp .9s ease;
    }

    .paste-title{
      font-size:34px;
      font-weight:700;
      letter-spacing:-1px;
      margin-bottom:18px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:18px;
    }

    .meta-card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .meta-label{
      color:var(--text-secondary);
      font-size:13px;
      margin-bottom:8px;
    }

    .meta-value{
      font-size:15px;
      font-weight:500;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;

      padding:8px 12px;
      border-radius:999px;

      background:var(--accent-soft);
      border:1px solid rgba(255,255,255,0.08);

      width:fit-content;
    }

    .badge-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#c4c7d0;
    }

    /* Code Section */

    .code-wrapper{
      margin-top:28px;

      background:var(--surface);
      border:1px solid var(--border);
      border-radius:28px;

      overflow:hidden;
      box-shadow:var(--shadow);

      animation:fadeUp 1.1s ease;
    }

    .code-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:18px 22px;

      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,0.02);

      flex-wrap:wrap;
      gap:12px;
    }

    .toolbar-left{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--text-secondary);
      font-size:14px;
    }

    .toolbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .code-container{
      overflow:auto;
      position:relative;
    }

    pre{
      margin:0;
      padding:28px !important;
      min-width:max-content;
      background:transparent !important;
    }

    code{
      font-family:"JetBrains Mono", monospace !important;
      font-size:14px;
      line-height:1.75;
    }

    /* Custom scrollbar */

    ::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,0.1);
      border-radius:999px;
    }

    ::-webkit-scrollbar-track{
      background:transparent;
    }

    /* Loading Skeleton */

    .skeleton{
      padding:30px;
      display:grid;
      gap:16px;
    }

    .skeleton-line{
      height:16px;
      border-radius:999px;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 25%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.03) 75%
        );
      background-size:200% 100%;
      animation:shimmer 2s infinite linear;
    }

    .skeleton-line:nth-child(1){ width:80%; }
    .skeleton-line:nth-child(2){ width:92%; }
    .skeleton-line:nth-child(3){ width:70%; }
    .skeleton-line:nth-child(4){ width:88%; }

    /* Tooltip */

    .tooltip{
      position:fixed;
      top:24px;
      right:24px;

      padding:12px 16px;
      border-radius:16px;

      background:rgba(22,24,30,0.95);
      border:1px solid var(--border);

      color:var(--success);
      font-size:14px;

      opacity:0;
      transform:translateY(10px);

      pointer-events:none;

      transition:all .35s ease;
      z-index:999;
    }

    .tooltip.show{
      opacity:1;
      transform:translateY(0);
    }

    /* Highlight.js overrides */

    .hljs{
      color:#d7dce2;
      background:transparent;
    }

    .hljs-comment{
      color:#7b8190;
      font-style:italic;
    }

    .hljs-keyword,
    .hljs-selector-tag{
      color:#b6bdd0;
    }

    .hljs-string{
      color:#c6d0d7;
    }

    .hljs-function,
    .hljs-title{
      color:#d3d9e4;
    }

    .hljs-number,
    .hljs-literal{
      color:#b8c7d1;
    }

    .hljs-params{
      color:#aab4bf;
    }

    /* Responsive */

    @media(max-width:768px){

      .header{
        padding:14px 16px;
      }

      .hero{
        padding:22px;
      }

      .paste-title{
        font-size:26px;
      }

      .code-toolbar{
        padding:16px;
      }

      pre{
        padding:22px !important;
      }

      .toolbar-actions{
        width:100%;
      }

      .toolbar-actions .btn{
        flex:1;
      }
    }

    @media(max-width:520px){

      .header{
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
      }

      .header-actions{
        width:100%;
        flex-wrap:wrap;
      }

      .header-actions .btn{
        flex:1;
      }
    }

    /* Animations */

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(18px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes shimmer{
      from{
        background-position:200% 0;
      }
      to{
        background-position:-200% 0;
      }
    }
    .theme{margin-bottom:15px}

    .spinner {
  width:10px;
  height:10px;
  border:2px solid #555;
  border-top:2px solid white;
  border-radius:50%;
  display:inline-block;
  animation:spin 0.8s linear infinite;
  margin-right:6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
          }

    #outputBlock{
  color:#d7dce2;
  font-family:"JetBrains Mono", monospace;
  line-height:1.7;
  white-space:pre-wrap;
}

#outputWrapper{
  animation:fadeUp .5s ease;
}
  </style>
</head>

<body>

  <div id="passwordModal"
     style="
       position:fixed;
       inset:0;
       background:rgba(0,0,0,0.6);
       display:none;
       align-items:center;
       justify-content:center;
       z-index:9999;
     ">

  <div style="
      background:#14171d;
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.1);
      width:300px;
    ">

    <h3 style="margin-bottom:10px;">Enter Password</h3>

    <input id="pastePassword"
           type="password"
           placeholder="Password"
           style="
             width:100%;
             padding:10px;
             border-radius:10px;
             border:1px solid #333;
             background:#0f1115;
             color:white;
           " />

    <button onclick="verifyPassword()"
            style="
              margin-top:12px;
              width:100%;
              padding:10px;
              border:none;
              border-radius:10px;
              background:#8d95a5;
              color:black;
              font-weight:600;
              cursor:pointer;
            ">
      Unlock
    </button>
<p id="loadingText" style="color:#aaa;font-size:12px;margin-top:8px;display:none;">
 <span class="spinner"></span>  ⏳ Verifying password...
</p>
    <p id="passError"
       style="color:red;font-size:12px;margin-top:8px;"></p>

  </div>

  </div>

<!-- HEADER ACTIONS -->


      <!-- ERROR STATE -->
<section
  class="hero"
  id="errorState"
  style="display:none;"
>

  <h1 class="paste-title">
    Paste Not Found
  </h1>

  <p
    style="
      color:var(--text-secondary);
      margin-top:10px;
      line-height:1.7;
    "
  >
    The paste may have expired, been deleted,
    or the URL is invalid.
  </p>

</section>



<!-- HERO -->
<section class="hero" id="heroSection">
  <button class="theme" id="themeToggle">Toggle Theme</button>

  <!-- TITLE SHIMMER -->
  <div
    class="skeleton-line"
    id="titleSkeleton"
    style="
      width:320px;
      height:34px;
      margin-bottom:24px;
      border-radius:14px;
    "
  ></div>

  <h1
    class="paste-title"
    id="pasteTitle"
    style="display:none;"
  ></h1>

  <div class="meta-grid">

    <!-- CREATED -->
    <div class="meta-card">

      <div class="meta-label">
        Created
      </div>

      <div
        class="skeleton-line"
        id="createdSkeleton"
        style="width:120px;"
      ></div>

      <div
        class="meta-value"
        id="createdAt"
        style="display:none;"
      ></div>

    </div>

    <!-- EXPIRATION -->
    <div class="meta-card">

      <div class="meta-label">
        Expiration
      </div>

      <div
        class="skeleton-line"
        id="expirationSkeleton"
        style="width:100px;"
      ></div>

      <div
        class="meta-value"
        id="expiration"
        style="display:none;"
      ></div>

    </div>

    <!-- ID -->
    <div class="meta-card">

      <div class="meta-label">
        Paste ID
      </div>

      <div
        class="skeleton-line"
        id="idSkeleton"
        style="width:140px;"
      ></div>

      <div
        class="meta-value"
        id="pasteId"
        style="display:none;"
      ></div>

    </div>
<!-- VISIBILITY -->
<div class="meta-card">

  <div class="meta-label">
    Visibility
  </div>

  <div
    class="skeleton-line"
    id="visibilitySkeleton"
    style="width:90px;"
  ></div>

  <div
    class="meta-value"
    id="visibility"
    style="display:none;"
  ></div>

</div>
  </div>

</section>



<!-- CODE WRAPPER -->
<section
  class="code-wrapper"
  id="codeWrapper"
>

  <div class="code-toolbar">

    <div class="toolbar-left">

      <!-- FILE NAME SHIMMER -->
      <div
        class="skeleton-line"
        id="fileSkeleton"
        style="width:90px;"
      ></div>

      <span
        id="fileName"
        style="display:none;"
      ></span>

      <span>•</span>

      <!-- LINE SHIMMER -->
      <div
        class="skeleton-line"
        id="lineSkeleton"
        style="width:60px;"
      ></div>

      <span
        id="lineCount"
        style="display:none;"
      ></span>

    </div>

    <div class="toolbar-actions">

      <button class="btn" id="copyBtn">
        Copy
      </button>

      <button id="rawBtn" class="btn">
        Raw View
      </button>
<button class="btn" id="runBtn">
    Run Code
  </button>

    </div>

  </div>

  <!-- CODE SHIMMER -->
  <div class="skeleton" id="skeleton">

    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>

  </div>

  <!-- CODE -->
  <div
    class="code-container"
    id="codeContainer"
    style="display:none;"
  >

<pre><code
class="language-plaintext"
id="codeBlock"
></code></pre>

  </div>

</section>


<section
  class="code-wrapper"
  id="outputWrapper"
  style="margin-top:20px; display:none;"
>

  <div class="code-toolbar">
    <div class="toolbar-left">
      Output
    </div>
  </div>

  <div class="code-container">

<pre>
<code id="outputBlock"></code>
</pre>

  </div>

</section>
<script>


const runBtn =
  document.getElementById("runBtn")

const outputWrapper =
  document.getElementById("outputWrapper")

const outputBlock =
  document.getElementById("outputBlock")



runBtn.addEventListener(
  "click",
  runCode
)



async function runCode(){

  outputWrapper.style.display = "block"

  outputBlock.textContent =
    "Running..."

runBtn.innerHTML =
  "Running..."

  try{

    const language =
      codeBlock.className
        .replace("language-", "")



    const response = await fetch(
      "https://pastedb.onrender.com/run",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          language,

          code:codeBlock.textContent

        })

      }
    )



    const data =
      await response.json()



    outputBlock.textContent =
      data.output || data.error

  }

  catch(err){

    outputBlock.textContent =
      "Execution failed"

  }
  finally{


    runBtn.innerHTML =
  "Run Code"
  }

}
  
  let isUnlocked = false;

  // THEME

  document
    .getElementById("themeToggle")
    .addEventListener("click", () => {

      document.body.classList.toggle("light")

    })



  // GET ID

  
let pasteId;


const path = window.location.pathname

if(path.startsWith("/paste/")){

  pasteId = path.split("/paste/")[1]

}

  // ELEMENTS
  const visibility =
  document.getElementById("visibility")

  const heroSection =
    document.getElementById("heroSection")

  const errorState =
    document.getElementById("errorState")

  const codeWrapper =
    document.getElementById("codeWrapper")



  const pasteTitle =
    document.getElementById("pasteTitle")

  const createdAt =
    document.getElementById("createdAt")

  const expiration =
    document.getElementById("expiration")

  const pasteIdEl =
    document.getElementById("pasteId")

  const fileName =
    document.getElementById("fileName")

  const lineCount =
    document.getElementById("lineCount")

  const codeBlock =
    document.getElementById("codeBlock")



  const skeleton =
    document.getElementById("skeleton")

  const codeContainer =
    document.getElementById("codeContainer")



  // LOAD PASTE

  async function loadPaste(){

    try{
  
      const response = await fetch(
        `https://pastedb.onrender.com/p/${pasteId}`,
      {
        credentials:"include"
      }
        
      )


      // INVALID ID

      if(!response.ok){

        heroSection.style.display = "none"

        codeWrapper.style.display = "none"

        errorState.style.display = "block"

        return

      }



      const data =
        await response.json()


if (data.password && !isUnlocked) {
  window._pasteData = data;
  document.getElementById("passwordModal").style.display = "flex";
  return;
}
      // TITLE
      console.log(data.expire_at)
console.log(new Date(data.expire_at))
console.log(new Date())

      pasteTitle.textContent =
        data.title || "Untitled Paste"

      pasteTitle.style.display = "block"

      document
        .getElementById("titleSkeleton")
        .style.display = "none"




// CREATED

if (data.created_at) {

  let date;

  // UNIX timestamp
  if (typeof data.created_at === "number") {

    date = new Date(data.created_at * 1000);

  }

  // ISO string
  else {

    const rawDate =
      data.created_at.endsWith("Z") ||
      data.created_at.includes("+")
        ? data.created_at
        : data.created_at + "Z";

    date = new Date(rawDate);

  }

  const formatter = new Intl.DateTimeFormat("en-IN", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  createdAt.textContent =
    formatter.format(date);

} else {

  createdAt.textContent = "Unknown";

}

// SHOW CREATED SECTION ALWAYS

createdAt.style.display = "block";

document
  .getElementById("createdSkeleton")
  .style.display = "none";

      
if (data.expire_at) {

  const now = new Date();

  const expireDate = new Date(
    data.expire_at.endsWith("Z")
      ? data.expire_at
      : data.expire_at + "Z"
  );

  const diff =
    expireDate.getTime() - now.getTime();

  if (diff <= 0) {

    expiration.textContent =
      "Expired";

  }

  else {

    const minutes =
      Math.floor(diff / 1000 / 60);

    const hours =
      Math.floor(minutes / 60);

    const days =
      Math.floor(hours / 24);

    if (days >= 1) {

      expiration.textContent =
        `Expires in ${days} day${days > 1 ? "s" : ""}`;

    }

    else if (hours >= 1) {

      expiration.textContent =
        `Expires in ${hours} hour${hours > 1 ? "s" : ""}`;

    }

    else {

      expiration.textContent =
        `Expires in ${minutes} minute${minutes > 1 ? "s" : ""}`;

    }

  }

}

else {

  expiration.textContent =
    "Never expires";

}
    

      expiration.style.display = "block"

      document
        .getElementById("expirationSkeleton")
        .style.display = "none"



      // ID

      pasteIdEl.textContent =
        pasteId

      pasteIdEl.style.display = "block"

      document
        .getElementById("idSkeleton")
        .style.display = "none"



      // CONTENT

      codeBlock.textContent =
        data.content || ""



      // LANGUAGE

      const language =
        data.syntax || "plaintext"



      // EXTENSIONS

      const extensions = {

        python: "py",

        javascript: "js",

        html: "html",

        css: "css",

        json: "json",

        java: "java"

      }



      const ext =
        extensions[language] || "txt"



      // FILE NAME

      fileName.textContent =
        `main.${ext}`

      fileName.style.display = "block"

      document
        .getElementById("fileSkeleton")
        .style.display = "none"



      // LINES

      const totalLines =
        codeBlock.textContent
          .split("\n")
          .length



      lineCount.textContent =
        `${totalLines} lines`

      lineCount.style.display = "block"

      document
        .getElementById("lineSkeleton")
        .style.display = "none"



      // HIGHLIGHT

      codeBlock.className =
        `language-${language}`

      hljs.highlightElement(codeBlock)



      // SHOW CODE

      skeleton.style.display = "none"

      codeContainer.style.display = "block"

console.log(window.location.pathname)
console.log(pasteId)
      // VISIBILITY

visibility.textContent =
  data.visibility === "private"
    ? "Private"
    : "Public"

visibility.style.display = "block"

document
  .getElementById("visibilitySkeleton")
  .style.display = "none"

    }

    catch(err){

      heroSection.style.display = "none"

      codeWrapper.style.display = "none"

      errorState.style.display = "block"
console.log(window.location.pathname)
console.log(pasteId)
      alert(err)
    }

  }



  loadPaste()



  // COPY

  function copyCode(){

    navigator.clipboard.writeText(
      codeBlock.innerText
    )

  }



  document
    .getElementById("copyBtn")
    .addEventListener("click", copyCode)

  



  document
    .getElementById("rawBtn")
    .addEventListener("click", () => {

      // CREATE NEW WINDOW
      const rawWindow = window.open("", "_blank")

      // GET RAW CODE
      const rawCode = codeBlock.textContent

      // SHOW RAW CONTENT
      rawWindow.document.write(`
<!DOCTYPE html>
<html>
<head>
  <title>Raw Paste</title>

  <style>

    body{
      margin:0;
      padding:24px;

      background:#0f1115;
      color:#d7dce2;

      font-family:"JetBrains Mono", monospace;
      font-size:14px;
      line-height:1.7;

      white-space:pre-wrap;
      word-break:break-word;
    }

  </style>
</head>

<body>${escapeHtml(rawCode)}</body>

</html>
      `)

      rawWindow.document.close()

    })



  // ESCAPE HTML

  function escapeHtml(text){

    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")

  }

 async function verifyPassword(){

  const password =
    document.getElementById("pastePassword").value;

  const loadingText =
    document.getElementById("loadingText");

  const errorText =
    document.getElementById("passError");

  // RESET UI
  errorText.textContent = "";
  loadingText.style.display = "block";   // 👈 show spinner text

  try {

    const res = await fetch(
      `https://pastedb.onrender.com/p/${pasteId}/verify-password`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ password })
      }
    );

    const data = await res.json();

    if(data.access){

      isUnlocked = true;

      document.getElementById("passwordModal").style.display = "none";

      loadPaste();

    } else {

      errorText.textContent = "Wrong password";

    }

  } catch (err) {

    errorText.textContent = "Server error. Try again."+err;

  } finally {

    loadingText.style.display = "none"; // 👈 always hide

  }
  }
</script>
