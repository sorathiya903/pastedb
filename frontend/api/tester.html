<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteDB API Tester</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#4f7cff33,transparent 40%),
    radial-gradient(circle at bottom right,#7b5cff33,transparent 40%),
    #0b1020;
    color:#fff;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    font-size:34px;
    margin-bottom:25px;
    font-weight:700;
}

.request{
    background:rgba(25,31,48,.85);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.row{
    display:flex;
    gap:15px;
    margin-bottom:18px;
}

select,
input,
textarea{
    background:#141b2d;
    border:1px solid #2d3958;
    color:#fff;
    border-radius:12px;
    padding:14px;
    font-size:15px;
    transition:.25s;
    outline:none;
}

select{
    width:130px;
}

input{
    flex:1;
}

textarea{
    width:100%;
    min-height:220px;
    resize:vertical;
    font-family:Consolas,monospace;
}

select:focus,
input:focus,
textarea:focus{
    border-color:#5c8dff;
    box-shadow:0 0 15px rgba(92,141,255,.3);
}

button{
    margin-top:18px;
    border:none;
    border-radius:12px;
    padding:14px 28px;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

.request button{
    background:linear-gradient(135deg,#4f7cff,#7b5cff);
    color:white;
    font-weight:600;
}

.request button:hover{
    box-shadow:0 8px 25px rgba(79,124,255,.45);
}

.info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    margin-top:25px;
}

.info div{
    background:rgba(25,31,48,.85);
    border:1px solid rgba(255,255,255,.08);
    padding:18px;
    border-radius:16px;
    font-size:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.response-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:30px;
    margin-bottom:10px;
}

.response-header h3{
    font-size:22px;
}

.copy-btn{
    background:#2e8bff;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
}

.copy-btn:hover{
    background:#1d74e7;
}

pre{
    background:#111827;
    border:1px solid #2d3958;
    border-radius:16px;
    padding:22px;
    min-height:320px;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
    font-family:Consolas,monospace;
    line-height:1.6;
    box-shadow:0 12px 30px rgba(0,0,0,.3);
}

.success{
    color:#30d158;
    font-weight:600;
}

.error{
    color:#ff4d6d;
    font-weight:600;
}

@media(max-width:700px){

.row{
    flex-direction:column;
}

select{
    width:100%;
}

h1{
    font-size:28px;
}

}

</style>

</head>
<body>

<div class="container">

<h1>🚀 PasteDB API Tester</h1>

<div class="request">

<div class="row">
<select id="method">
<option>GET</option>
<option>POST</option>
<option>PUT</option>
<option>PATCH</option>
<option>DELETE</option>
</select>

<input
id="url"
placeholder="https://api.example.com/users">
</div>

<textarea
id="body"
placeholder='JSON Body (Optional)
{
    "name":"John"
}'></textarea>

<button onclick="sendRequest()">Send Request</button>

</div>

<div class="info">
    <div>Status: <span id="status">-</span></div>
    <div>Time: <span id="time">-</span></div>
    <div>Size: <span id="size">-</span></div>
</div>

<div class="response-header">
    <h3>Response</h3>
    <button id="copyBtn" class="copy-btn" style="display:none;"
    onclick="navigator.clipboard.writeText(document.getElementById('response').textContent)">
        📋 Copy
    </button>
</div>

<pre id="response">Response will appear here...</pre>

</div>

<script>
async function sendRequest() {

    const method = document.getElementById("method").value;
    const url = document.getElementById("url").value.trim();
    const body = document.getElementById("body").value.trim();

    if (!url) {
        alert("Please enter a URL.");
        return;
    }

    const responseBox = document.getElementById("response");

    responseBox.textContent = "Sending request...";

    const options = {
        method,
        headers: {
            "Content-Type": "application/json"
        }
    };

    if (method !== "GET" && body) {
        try {
            options.body = JSON.stringify(JSON.parse(body));
        } catch {
            responseBox.textContent = "❌ Invalid JSON Body";
            return;
        }
    }

    const start = performance.now();

    try {

        const res = await fetch(url, options);

        const end = performance.now();

        const text = await res.text();
      const status = document.getElementById("status");

status.textContent = `${res.status} ${res.statusText}`;

if(res.ok){
    status.className = "success";
}else{
    status.className = "error";
}

        document.getElementById("status").textContent =
            `${res.status} ${res.statusText}`;

        document.getElementById("time").textContent =
            `${Math.round(end - start)} ms`;

        document.getElementById("size").textContent =
            `${new Blob([text]).size} bytes`;

        let formatted;

        try {
            formatted = JSON.stringify(JSON.parse(text), null, 4);
        } catch {
            formatted = text || "(Empty Response)";
        }

        responseBox.textContent = formatted;
        document.getElementById("copyBtn").style.display = "block";


    } catch (err) {

        const end = performance.now();

        document.getElementById("status").textContent = "Network Error";
        document.getElementById("time").textContent =
            `${Math.round(end - start)} ms`;
        document.getElementById("size").textContent = "-";

        responseBox.textContent = JSON.stringify({
            error: err.name,
            message: err.message,
            hint: "Possible CORS issue, invalid URL, or server is offline."
        }, null, 4);
        document.getElementById("copyBtn").style.display = "block";


    }

}
</script>

</body>
</html>
