<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteDB API Tester</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Segoe UI,sans-serif;
    background:#0d1117;
    color:#e6edf3;
}

.container{
    width:min(1200px,95%);
    margin:40px auto;
}

h1{
    font-size:32px;
    margin-bottom:6px;
}

.subtitle{
    color:#8b949e;
    margin-bottom:35px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:14px;
    padding:22px;
    margin-bottom:25px;
}

.row{
    display:flex;
    gap:12px;
    margin-bottom:18px;
}

.method{

    width:130px;

    background:#21262d;
    color:white;

    border:1px solid #30363d;

    border-radius:10px;

    padding:12px;

    font-size:15px;

    outline:none;

}

.url{

    flex:1;

    background:#0d1117;

    color:white;

    border:1px solid #30363d;

    border-radius:10px;

    padding:12px 16px;

    font-size:15px;

    outline:none;

}

.url:focus,
.method:focus,
textarea:focus{

    border-color:#2f81f7;

}

.section-title{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:12px;

}

.section-title h3{

    font-size:18px;

}

.copy-btn{

    background:#21262d;

    color:white;

    border:none;

    border-radius:8px;

    padding:8px 15px;

    cursor:pointer;

    transition:.25s;

}

.copy-btn:hover{

    background:#2f81f7;

}

textarea{

    width:100%;

    min-height:240px;

    background:#0d1117;

    color:#79c0ff;

    border:1px solid #30363d;

    border-radius:10px;

    padding:16px;

    resize:vertical;

    font-size:14px;

    font-family:Consolas,monospace;

    outline:none;

}

.actions{

    margin-top:18px;

    display:flex;

    gap:15px;

}

.send{

    background:#238636;

    color:white;

    border:none;

    padding:13px 30px;

    border-radius:10px;

    cursor:pointer;

    font-size:15px;

    font-weight:600;

}

.send:hover{

    background:#2ea043;

}

.clear{

    background:#30363d;

    color:white;

    border:none;

    padding:13px 25px;

    border-radius:10px;

    cursor:pointer;

}

.clear:hover{

    background:#484f58;

}

.stats{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:18px;

    margin-bottom:22px;

}

.stat{

    background:#161b22;

    border:1px solid #30363d;

    border-radius:12px;

    padding:18px;

}

.label{

    color:#8b949e;

    font-size:13px;

    margin-bottom:6px;

}

.value{

    font-size:19px;

    font-weight:600;

}

.response{

    background:#0d1117;

    border:1px solid #30363d;

    border-radius:10px;

    padding:18px;

    overflow:auto;

    min-height:320px;

    color:#79c0ff;

    font-family:Consolas,monospace;

    white-space:pre-wrap;

    word-break:break-word;

}

.success{

    color:#3fb950;

}

.error{

    color:#f85149;

}

.loading{

    color:#58a6ff;

}

.badge{

    display:inline-block;

    padding:6px 12px;

    border-radius:999px;

    font-size:13px;

    font-weight:600;

}

.green{

    background:#16331f;

    color:#3fb950;

}

.red{

    background:#3d1718;

    color:#ff7b72;

}

.blue{

    background:#132f4c;

    color:#58a6ff;

}

.orange{

    background:#4d2d14;

    color:#ffa657;

}

footer{

    text-align:center;

    color:#8b949e;

    margin:35px 0;

    font-size:14px;

}

@media(max-width:800px){

.row{

flex-direction:column;

}

.stats{

grid-template-columns:1fr;

}

.method{

width:100%;

}

}

</style>

</head>
<body>

<div class="container">

<h1>🚀 PasteDB API Tester</h1>

<p class="subtitle">
Fast, lightweight REST API testing directly from your browser.
</p>

<div class="card">

<div class="row">

<select class="method" id="method">

<option>GET</option>
<option>POST</option>
<option>PUT</option>
<option>PATCH</option>
<option>DELETE</option>

</select>

<input
class="url"
id="url"
placeholder="https://api.example.com/users">

</div>

<div class="section-title">

<h3>Request Body</h3>

<button class="copy-btn">
📋 Copy JSON
</button>

</div>

<textarea
id="body"
placeholder='{
    "name":"John",
    "age":20
}'></textarea>

<div class="actions">

<button class="send">
🚀 Send Request
</button>

<button class="clear">
Clear
</button>

</div>

</div>

<div class="stats">

<div class="stat">

<div class="label">
Status
</div>

<div class="value success">
--
</div>

</div>

<div class="stat">

<div class="label">
Response Time
</div>

<div class="value">
-- ms
</div>

</div>

<div class="stat">

<div class="label">
Response Size
</div>

<div class="value">
--
</div>

</div>

</div>

<div class="card">

<div class="section-title">

<h3>Response</h3>

<button class="copy-btn">
📋 Copy Response
</button>

</div>

<pre class="response">
{
    "message":"Response will appear here..."
}
</pre>

</div>

<footer>

Built with ❤️ for developers • PasteDB API Tester

</footer>

</div>
    <script>
    
    const sendBtn = document.querySelector(".send");
const clearBtn = document.querySelector(".clear");
const copyBtns = document.querySelectorAll(".copy-btn");

const method = document.getElementById("method");
const url = document.getElementById("url");
const body = document.getElementById("body");

const responseBox = document.querySelector(".response");

const statusValue = document.querySelectorAll(".value")[0];
const timeValue = document.querySelectorAll(".value")[1];
const sizeValue = document.querySelectorAll(".value")[2];



sendBtn.onclick = sendRequest;



copyBtns[0].onclick = () => {

    navigator.clipboard.writeText(body.value);

    copyBtns[0].innerText = "✓ Copied";

    setTimeout(() => {

        copyBtns[0].innerText = "📋 Copy JSON";

    },1500);

};



copyBtns[1].onclick = () => {

    navigator.clipboard.writeText(responseBox.textContent);

    copyBtns[1].innerText = "✓ Copied";

    setTimeout(() => {

        copyBtns[1].innerText = "📋 Copy Response";

    },1500);

};



clearBtn.onclick = ()=>{

    body.value="";

};



async function sendRequest(){

    let api=url.value.trim();

    if(!api){

        alert("Enter API URL");

        return;

    }

    if(!/^https?:\/\//i.test(api)){

        api="https://"+api;

    }

    const options={

        method:method.value,

        headers:{}

    };



    if(method.value!="GET" && body.value.trim()){

        try{

            options.headers["Content-Type"]="application/json";

            options.body=JSON.stringify(JSON.parse(body.value));

        }

        catch{

            alert("Invalid JSON");

            return;

        }

    }

    sendBtn.disabled=true;

    sendBtn.innerHTML="⏳ Sending...";

    responseBox.textContent="Waiting for response...";

    responseBox.style.color="#58a6ff";



    statusValue.innerHTML="-";

    timeValue.innerHTML="-";

    sizeValue.innerHTML="-";



    const start=performance.now();



    try{

        const res=await fetch(api,options);

        const end=performance.now();



        const text=await res.text();



        statusValue.innerHTML=res.status+" "+res.statusText;

        statusValue.className="value "+(res.ok?"success":"error");



        timeValue.innerHTML=Math.round(end-start)+" ms";



        sizeValue.innerHTML=

        new Blob([text]).size+" bytes";



        const type=res.headers.get("content-type")||"";



        if(type.includes("application/json")){

            try{

                responseBox.textContent=

                JSON.stringify(JSON.parse(text),null,4);

            }

            catch{

                responseBox.textContent=text;

            }

        }

        else{

            responseBox.textContent=text;

        }



        responseBox.style.color="#79c0ff";



    }

    catch(err){

        const end=performance.now();



        statusValue.innerHTML="Network Error";

        statusValue.className="value error";



        timeValue.innerHTML=Math.round(end-start)+" ms";



        responseBox.textContent=

JSON.stringify({

error:err.name,

message:err.message,

hint:"Possible CORS issue, invalid URL, DNS failure, SSL issue or server offline."

},null,4);



        responseBox.style.color="#ff7b72";

    }



    sendBtn.disabled=false;

    sendBtn.innerHTML="🚀 Send Request";

}



url.addEventListener("keydown",e=>{

    if(e.key==="Enter"){

        sendRequest();

    }

});



body.addEventListener("keydown",e=>{

    if(e.ctrlKey && e.key==="Enter"){

        sendRequest();

    }

});
    
    
    </script>
</body>
    </html>
