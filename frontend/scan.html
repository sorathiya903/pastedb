<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scan PasteDB QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

    *{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,system-ui,sans-serif;
    background:
        radial-gradient(circle at top,#262626,#0f0f0f 60%,#000);
    color:#fff;
    padding:20px;
}

.container{
    width:100%;
    max-width:470px;
}

.card{
    background:#111;
    border:1px solid #262626;
    border-radius:24px;
    padding:24px;
    box-shadow:
        0 20px 60px rgba(0,0,0,.45);
}

.icon{
    font-size:42px;
    text-align:center;
    margin-bottom:8px;
}

h2{
    margin:0;
    text-align:center;
    font-size:28px;
}

.subtitle{
    margin:12px 0 24px;
    text-align:center;
    color:#9ca3af;
    line-height:1.5;
    font-size:15px;
}

#reader{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    border:2px solid #2f2f2f;
    background:#000;
}

#status{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:#181818;
    border:1px solid #2d2d2d;
    color:#d1d5db;
    text-align:center;
    font-size:14px;
}

button{
    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.98);
}

video{
    border-radius:16px;
}

@media(max-width:480px){

    .card{
        padding:18px;
    }

    h2{
        font-size:24px;
    }

    #reader{
        min-height:300px;
    }

    }
</style>
</head>

<body>

<body>

<div class="container">

    <div class="card">

        <div class="icon">📷</div>

        <h2>Scan PasteDB QR</h2>

        <p class="subtitle">
            Scan a PasteDB QR code or choose an image containing one.
        </p>

        <div id="reader"></div>

        <div id="status">
            Point your camera at a PasteDB QR code
        </div>

        <button id="scanImageBtn">
            Scan from Image
        </button>

    </div>

</div>

<input
    type="file"
    id="imageInput"
    accept="image/*"
    hidden
>

<script>
  const imageInput =
    document.getElementById("imageInput");

document
.getElementById("scanImageBtn")
.onclick = () => imageInput.click();

imageInput.onchange = async () => {

    if (!imageInput.files.length) return;

    try {

        const html5QrCode =
            new Html5Qrcode("reader");

        const result =
            await html5QrCode.scanFile(
                imageInput.files[0],
                true
            );

        if (navigator.vibrate) {
            navigator.vibrate(150);
        }

        document.getElementById("status").textContent =
            "Opening... "+ result;
      

        if (
            result.startsWith("https://pastedb")
        ) {

            location.href = result;

        } else {

            alert("Not a PasteDB QR code.");

        }

    } catch (err) {
alert(err)
        
    }

};
const scanner = new Html5Qrcode("reader");

scanner.start(
    {
        facingMode: "environment"
    },
    {
        fps: 10,
        qrbox: 250
    },
    async (decodedText)=>{

        await scanner.stop();

        if(navigator.vibrate){
            navigator.vibrate(150);
        }

        document.getElementById("status").textContent =
            "Opening...";

        // Optional: only allow PasteDB URLs
        if(
            decodedText.startsWith(location.origin + "/paste/") ||
            decodedText.startsWith(location.origin + "/")
        ){
            location.href = decodedText;
        }else{
            alert("This is not a PasteDB QR code.");
            location.reload();
        }

    },
    ()=>{}
).catch(err=>{

    document.getElementById("status").textContent =
        "Camera error: " + err;

});
</script>

</body>
  </html>
