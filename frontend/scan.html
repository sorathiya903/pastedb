<style>

    width:100%;

    margin-top:18px;

    border-radius:14px;

    border:1px solid #2d2d2d;

    text-align:center;
    font-size:14px;
}

    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

    transform:translateY(-2px);
}

    transform:scale(.98);
}

video{
    border-radius:16px;
}

        padding:18px;
    }

        font-size:24px;

        min-height:300px;

<body>

<body>

<div class="container">

    <div class="card">

        <div class="icon">📷</div>

        <h2>Scan PasteDB QR</h2>

        <p class="subtitle">
            Scan a PasteDB QR code or choose an image containing one.
        </p>

        <div id="reader"></div>

        <div id="status">
            Point your camera at a PasteDB QR code
        </div>

        <button id="scanImageBtn">
            Scan from Image
        </button>

    </div>

</div>

<input
    type="file"
    id="imageInput"
    accept="image/*"
    hidden
>

<script>
  const imageInput =
    document.getElementById("imageInput");

document
.getElementById("scanImageBtn")
.onclick = () => imageInput.click();

imageInput.onchange = async () => {

    if (!imageInput.files.length) return;

    try {

        const html5QrCode =
            new Html5Qrcode("reader");

        const result =
            await html5QrCode.scanFile(
                imageInput.files[0],
                true
            );

        if (navigator.vibrate) {
            navigator.vibrate(150);
        }

        document.getElementById("status").textContent =
            "Opening... "+ result;
      

        if (
            result.startsWith("https://pastedb")
        ) {

            location.href = result;

        } else {

            alert("Not a PasteDB QR code.");

        }

    } catch (err) {
alert(err)
        
    }

};
const scanner = new Html5Qrcode("reader");

scanner.start(
    {
        facingMode: "environment"
    },
    {
        fps: 10,
        qrbox: 250
    },
    async (decodedText)=>{

        await scanner.stop();

        if(navigator.vibrate){
            navigator.vibrate(150);
        }

        document.getElementById("status").textContent =
            "Opening...";

        // Optional: only allow PasteDB URLs
        if(
            decodedText.startsWith(location.origin + "/paste/") ||
            decodedText.startsWith(location.origin + "/")
        ){
            location.href = decodedText;
        }else{
            alert("This is not a PasteDB QR code.");
            location.reload();
        }

    },
    ()=>{}
).catch(err=>{

    document.getElementById("status").textContent =
        "Camera error: " + err;

});
</script>

</body>
