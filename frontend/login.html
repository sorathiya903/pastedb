<!DOCTYPE html>
<html lang="en">

<head>

</script>
  <script src="config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PasteDB</title>
  <meta name="description" content="Login to PasteDB to manage your pastes, view private content, and sync across devices.">
  <link rel="canonical" href="https://pastedb.netlify.app/login.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f4f3;
      --card: #fbfbfa;
      --border: #e5e5e3;
      --text: #1d1d1d;
      --muted: #787878;
      --input: #ffffff;
      --button: #202020;
      --buttonText: #f5f5f5;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      --highlight: rgba(0, 0, 0, 0.03);
    }

    body.dark {
      --bg: #161616;
      --card: #1d1d1d;
      --border: #2b2b2b;
      --text: #ececec;
      --muted: #9d9d9d;
      --input: #202020;
      --button: #efefef;
      --buttonText: #111;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --highlight: rgba(255, 255, 255, 0.03);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.35s ease;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.5;
    }

    .glow1 {
      background: rgba(120, 120, 120, 0.08);
      top: -200px;
      left: -150px;
    }

    .glow2 {
      background: rgba(160, 160, 160, 0.08);
      right: -150px;
      bottom: -200px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .logo-icon div {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--text);
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .logo-text p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      font-size: 15px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 52px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--input);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.25s ease;
      position: relative;
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .google-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-text {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-text a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: 0.25s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.2);
      border-top: 2px solid var(--text);
      animation: spin 0.8s linear infinite;
    }

    body.dark .spinner {
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .row{
display:flex;
      justify-content:center;
      align-items:center 
    }
  </style>
</head>

<body class="">
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <button class="theme-toggle" onclick="toggleTheme()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </button>

  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <div></div>
      </div>
      <div class="logo-text">
        <h1>PasteDB</h1>
        <p>Elegant text sharing</p>
      </div>
    </div>

    <div class="login-header">
      <h2>Welcome back</h2>
      <p>Sign in to access your pastes</p>
    </div>

    <div id="errorBox" class="error-box"></div>

    <!-- Google Sign-In button will be rendered here -->
    <div id="g_id_onload"
      data-client_id="169600349371-uqd2ban2g8d60gunf5tes428qjr0hng4.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>

    <button onclick="triggerGoogleLogin()" class="google-btn" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.8 1.1 7.9 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.3 19 12 24 12c3 0 5.8 1.1 7.9 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.4 5.3-6.2 6.6l6.2 5.2C39 36.4 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"/>
      </svg>
      <span class="row" id="googleBtnText">Continue with Google</span>
    </button>

    <div class="divider">or</div>

    <div class="footer-text">
      Don't have an account? <a href="/create.html">Create a paste as guest</a><br>
      By signing in, you agree to our <a href="/terms.html">Terms</a>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg;
      box.classList.add("show");
      setTimeout(() => box.classList.remove("show"), 5000);
    }

    function triggerGoogleLogin() {
      google.accounts.id.prompt();
    }

    async function handleCredentialResponse(response) {
      const btn = document.getElementById("googleBtn");
      const btnText = document.getElementById("googleBtnText");
      
      btn.disabled = true;
      btnText.innerHTML = '<div class="spinner"></div> &nbsp; Signing in...';

      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ token: response.credential })
        });

        const data = await res.json();

        if (data.status === "success") {
          // Redirect to dashboard or create page
          const redirect = new URLSearchParams(window.location.search).get("redirect");
          window.location.href = redirect || "/dashboard.html";
        } else {
          showError(data.detail || "Login failed. Please try again.");
          btn.disabled = false;
          btnText.textContent = "Continue with Google";
        }
      } catch (err) {
        console.error(err);
        showError("Could not connect to server. Please try again.");
        btn.disabled = false;
        btnText.textContent = "Continue with Google";
      }
    }

    // Check if already logged in
    window.addEventListener("load", async () => {
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          credentials: "include"
        });
        if (res.ok) {
          // Already logged in, redirect
          window.location.href = "/dashboard.html";
        }
      } catch (e) {
        // Not logged in, stay on login page
      }
    });
  </script>
</body>
  </html>
