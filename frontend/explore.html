  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg:#f5f5f4;
      --card:#ffffff;
      --border:#e8e8e8;

      --text:#111;
      --muted:#777;

      --shadow:
        0 10px 30px rgba(0,0,0,0.04);
    }

    body{

      background:var(--bg);

      color:var(--text);

      font-family:'Inter',sans-serif;

      min-height:100vh;

      padding:40px 22px;
    }

    .container{

      max-width:1450px;

      margin:auto;
    }

    .hero{

      margin-bottom:40px;
    }

    .hero h1{

      font-size:52px;

      margin-bottom:14px;
    }

    .hero p{

      color:var(--muted);

      font-size:18px;
    }

    .topbar{

      display:flex;

      gap:14px;

      margin-top:26px;

      flex-wrap:wrap;
    }

    .search{

      flex:1;

      min-width:240px;
    }

    input{

      width:100%;

      padding:16px 18px;

      border-radius:18px;

      border:1px solid var(--border);

      outline:none;

      font-size:15px;
    }
.grid{
    column-width:340px;
    column-gap:24px;
}

.card{
    display:inline-block;
    width:100%;
    margin-bottom:24px;
    break-inside:avoid;
}

    .card{

      background:var(--card);

      border:1px solid var(--border);

      border-radius:28px;

      overflow:hidden;

      box-shadow:var(--shadow);

      transition:0.25s ease;
    
  animation:fadeUp .4s ease;
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}
    .card:hover{

      transform:translateY(-4px);
    }

    .card-top{

      padding:22px;

      display:flex;

      align-items:center;

      justify-content:space-between;

      border-bottom:1px solid var(--border);
    }

    .user{

      display:flex;

      align-items:center;

      gap:12px;
    }

    .user img{

      width:46px;
      height:46px;

      border-radius:50%;

      object-fit:cover;
    }

    .user h3{

      font-size:15px;
    }

    .user p{

      font-size:13px;

      color:var(--muted);

      margin-top:2px;
    }

    .syntax{

      padding:8px 12px;

      border-radius:999px;

      background:#f1f1f1;

      font-size:12px;

      font-weight:600;
    }

    .content{

      padding:22px;
    }

    .content h2{

      margin-bottom:14px;

      font-size:22px;
    }

    pre{

      background:#f7f7f7;

      padding:18px;

      border-radius:18px;

      overflow:hidden;

      font-size:13px;

      line-height:1.7;

      font-family:
        'JetBrains Mono',
        monospace;

      max-height:220px;

      white-space:pre-wrap;
    }

    .stats{

      display:flex;

      gap:18px;

      padding:22px;

      border-top:1px solid var(--border);

      color:var(--muted);

      font-size:14px;

      flex-wrap:wrap;
    }

    .open-btn{

      margin:0 22px 22px;

      display:flex;

      align-items:center;

      justify-content:center;

      padding:15px;

      border-radius:18px;

      background:#111;

      color:white;

      text-decoration:none;

      font-weight:600;
    }

    @media(max-width:700px){

      .hero h1{
        font-size:36px;
      }

      body{
        padding:20px 14px;
      }
    }

.load {
  width: 50px;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 8px solid;
  border-color: #000 #0000;
  animation: l1 1s infinite;

  margin:auto;
  
}
@keyframes l1 {to{transform: rotate(.5turn)}}

      .star-btn{

  display:flex;

  align-items:center;

  gap:8px;

  padding:10px 14px;

  border-radius:14px;

  border:1px solid var(--border);

  background:#f7f7f7;

  cursor:pointer;

  transition:.25s ease;
}

.star-btn:hover{

  transform:translateY(-2px);
}

.star-btn.active{

  background:grey;

  color:white;
}

      .loader-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 0;
      }


      .navbar{

    position:sticky;
    top:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;flex-direction:row;

    padding:16px 20px;

    background:rgba(255,255,255,.88);
    backdrop-filter:blur(16px);

    border:1px solid var(--border);
    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.05);

    margin-bottom:40px;

    z-index:999;
}

.logo{

    display:flex;
    align-items:center;
    gap:10px;

    text-decoration:none;
    color:#111;

    font-size:24px;
    font-weight:700;
}

.menu-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:14px;

    background:#f5f5f5;

    cursor:pointer;

    font-size:24px;

    transition:.25s;
}

.menu-btn:hover{

    background:#111;
    color:white;
}

.menu{

    position:absolute;

    top:75px;
    right:0;

    width:230px;

    background:white;

    border:1px solid var(--border);

    border-radius:18px;

    box-shadow:0 18px 45px rgba(0,0,0,.12);

    display:none;

    overflow:hidden;
}

.menu.show{

    display:block;

    animation:menuIn .18s ease;
}

.menu a{

    display:block;

    padding:15px 18px;

    color:#111;

    text-decoration:none;

    transition:.2s;
}

.menu a:hover{

    background:#f5f5f5;
}

@keyframes menuIn{

from{

    opacity:0;
    transform:translateY(-10px) scale(.98);

}

to{

    opacity:1;
    transform:none;

}

  }

    

.logo{

    display:flex;
    align-items:center;
    gap:10px;

    font-size:22px;
    font-weight:700;
}

.logo span{

    letter-spacing:-0.5px;
}

.nav-links{

    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.nav-links a{

    text-decoration:none;

    color:#555;

    padding:10px 16px;

    border-radius:12px;

    transition:.25s;
}

.nav-links a:hover{

    background:#f2f2f2;
}

.nav-links a.active{

    background:#111;

    color:white;
}

.hero{

    margin-bottom:40px;
}

.hero-badge{

    display:inline-block;

    padding:8px 14px;

    border-radius:999px;

    background:#efefef;

    color:#555;

    font-size:13px;

    font-weight:600;

    margin-bottom:18px;
}

.hero h1{

    font-size:56px;

    line-height:1.05;

    margin-bottom:16px;
}

.hero p{

    max-width:700px;

    color:#666;

    font-size:18px;

    line-height:1.7;

    margin-bottom:30px;
}

.tabs{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

    margin-top:24px;
}

.tab{

    border:none;

    background:white;

    border:1px solid var(--border);

    padding:12px 18px;

    border-radius:999px;

    cursor:pointer;

    font-size:14px;

    transition:.25s;
}

.tab:hover{

    transform:translateY(-2px);

    box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.tab.active{

    background:#111;

    color:white;
}

@media(max-width:700px){


.hero h1{

    font-size:40px;
}

.nav-links{

    justify-content:center;
}
  }

  .toast{

  position:fixed;

  bottom:25px;
  left:50%;

  transform:translateX(-50%) translateY(20px);

  background:#111;
  color:#fff;

  padding:12px 20px;

  border-radius:14px;

  opacity:0;

  transition:.25s;

  pointer-events:none;

  z-index:99999;
}

.toast.show{

  opacity:1;

  transform:translateX(-50%) translateY(0);
    }

    .copy-btn-card{

  display:flex;
  align-items:center;
  gap:8px;

  border:none;
  background:none;

  cursor:pointer;

  color:var(--muted);

  font-size:14px;
}

.copy-btn-card:hover{

  color:#111;
  }

<body>

  <div class="container">

    <header class="navbar">

  <a href="/" class="logo">
    📋 <span>PasteDB</span>
  </a>

  <button data-ga-event="menu_explore" class="menu-btn" onclick="toggleMenu()">
    ☰
  </button>

  <div class="menu" id="menu">

    <a href="/">🏠 Home</a>

    <a href="/create">➕ Create</a>

    <a href="/explore">🌍 Explore</a>

    <a href="/about">ℹ️ About</a>

  </div>

<div class="hero">

<!--  <span class="hero-badge">
    🌎 Community
  </span>-->

  <h1>Explore Public Pastes</h1>

  <p>
    Discover code snippets, notes, images and projects shared by the
    PasteDB community.
  </p>

  <div class="topbar">

    <div class="search">
      <input
        data-ga-event="explore_search_click"
        type="text"
        id="searchInput"
        placeholder="🔍 Search title, author or content..."
      >
    </div>

  </div>

    <button class="tab active">
      Latest

    <button class="tab">

</div>

      class="grid"
      id="grid"
    >

    <div id="loader" class="loader-wrap">

</div>



  </div>
<div id="toast" class="toast">
Copied!
</div>
  <script>

    function toggleMenu(){

    document
        .getElementById("menu")
        .classList.toggle("show");

}

document.addEventListener("click", e=>{

    const menu=document.getElementById("menu");

    if(
        !e.target.closest(".menu") &&
        !e.target.closest(".menu-btn")
    ){

        menu.classList.remove("show");

    }

});

    
const loader = document.getElementById("loader");
    let allPastes = [];

    async function loadPastes(){

      const response = await fetch(
        `${API_URL}/explore`
      );

      const data = await response.json();

      allPastes = data;

      renderPastes(data);
    }
    function formatTimestamp(timestamp){

  if(!timestamp) return "Unknown";

  const date = new Date(timestamp * 1000);

  return new Intl.DateTimeFormat("en-IN", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  }).format(date);

    }

    function renderPastes(pastes){

      const grid =
        document.getElementById("grid");

      grid.innerHTML = "";
      loader.style.display = "none";

      pastes.forEach(paste => {

        grid.innerHTML += `

          <div class="card">

            <div class="card-top">

              <div class="user">

                <img
                  src="${paste.owner_picture || 'https://www.alaska.edu/_resources/images/placeholders/profile.png'}"
                >

                <div>

                  <h3>
  ${escapeHtml(paste.title)}
</h3>
                  <p>
                    ${formatTimestamp(paste.created_at)|| ""}
                  </p>

                </div>

              </div>

              <div class="syntax">
                ${paste.syntax}
              </div>

            </div>

            <div class="content">

              <h2>
                ${paste.title}
              </h2>

              <pre>${escapeHtml(
                paste.content
              )}</pre>

            </div>

            <div class="stats">

              
              

              <span style="display:flex;align-items:center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" height="20" width="20">
  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
</svg>&nbsp;
 ${paste.views}
              </span>

              <button
              data-ga-event="copy_code_explore"
  class="copy-btn-card"
  data-id="${paste.custom_id}"
  data-content="${encodeURIComponent(paste.content)}"
>
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 408 480">
    <path fill="currentColor" d="M299 5v43H43v299H0V48q0-18 12.5-30.5T43 5h256zm64 86q17 0 29.5 12.5T405 133v299q0 18-12.5 30.5T363 475H128q-18 0-30.5-12.5T85 432V133q0-17 12.5-29.5T128 91h235zm0 341V133H128v299h235z"/>
  </svg>

  <span class="copy-count">${paste.copies}</span>
</button>

              

            </div>

            <a
              href="paste/${paste.custom_id}"
              class="open-btn" data-ga-event="paste_open_explore"
            >
              Open Paste
            </a>

          </div>

        `;
      });
    }
document.addEventListener(
  "click",
  async (e) => {

    const btn =
      e.target.closest(".star-btn")

    if(!btn) return

    try{

      const pasteId =
        btn.dataset.id

      const response = await fetch(

        `${API_URL}/star/${pasteId}`,

        {
          method:"POST",
          credentials:"include"
        }

      )

      const data =
        await response.json()

      const icon =
        btn.querySelector(".starIcon")

      const count =
        btn.querySelector(".starCount")

      if(data.starred){

        btn.classList.add("active")

        icon.textContent = "★"


      }

      else{

        btn.classList.remove("active")

        icon.textContent = "☆"

      }

      count.textContent =
        data.stars

    }

    catch(err){

      console.error(err)

    }

  }
)


    document.addEventListener("click", async (e)=>{

    const btn = e.target.closest(".copy-btn-card");

    if(!btn) return;

    const content = decodeURIComponent(btn.dataset.content);

    await navigator.clipboard.writeText(content);

    const toast = document.getElementById("toast");

    toast.textContent = "Copied to clipboard";

    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },1500);

    try{

        const res = await fetch(
            `${API_URL}/copy/${btn.dataset.id}`,
            {
                method:"POST"
            }
        );

        const data = await res.json();

        btn.querySelector(".copy-count").textContent = data.copies;

    }catch(err){
        console.error(err);
    }

});

    
    
        function escapeHtml(text){

      const div =
        document.createElement("div");

      div.textContent = text;

      return div.innerHTML;
    }

    document
      .getElementById("searchInput")
      .addEventListener(
        "input",
        e => {

          const q =
            e.target.value.toLowerCase();

          const filtered =
            allPastes.filter(p =>

              p.title
                .toLowerCase()
                .includes(q)

              ||

              p.content
                .toLowerCase()
                .includes(q)

              ||

              p.owner_name
                .toLowerCase()
                .includes(q)
            );

          renderPastes(filtered);
        }
      );

    loadPastes();

  </script>

</body>
