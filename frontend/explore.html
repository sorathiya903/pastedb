<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Explore Pastes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg:#f5f5f4;
      --card:#ffffff;
      --border:#e8e8e8;

      --text:#111;
      --muted:#777;

      --shadow:
        0 10px 30px rgba(0,0,0,0.04);
    }

    body{

      background:var(--bg);

      color:var(--text);

      font-family:'Inter',sans-serif;

      min-height:100vh;

      padding:40px 22px;
    }

    .container{

      max-width:1450px;

      margin:auto;
    }

    .hero{

      margin-bottom:40px;
    }

    .hero h1{

      font-size:52px;

      margin-bottom:14px;
    }

    .hero p{

      color:var(--muted);

      font-size:18px;
    }

    .topbar{

      display:flex;

      gap:14px;

      margin-top:26px;

      flex-wrap:wrap;
    }

    .search{

      flex:1;

      min-width:240px;
    }

    input{

      width:100%;

      padding:16px 18px;

      border-radius:18px;

      border:1px solid var(--border);

      outline:none;

      font-size:15px;
    }

    .grid{

      display:flex ;
justify-content:center;
      align-items:center;
      grid-template-columns:
        repeat(auto-fit,minmax(340px,1fr));

      gap:24px;
    }

    .card{

      background:var(--card);

      border:1px solid var(--border);

      border-radius:28px;

      overflow:hidden;

      box-shadow:var(--shadow);

      transition:0.25s ease;
    
  animation:fadeUp .4s ease;
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}
    .card:hover{

      transform:translateY(-4px);
    }

    .card-top{

      padding:22px;

      display:flex;

      align-items:center;

      justify-content:space-between;

      border-bottom:1px solid var(--border);
    }

    .user{

      display:flex;

      align-items:center;

      gap:12px;
    }

    .user img{

      width:46px;
      height:46px;

      border-radius:50%;

      object-fit:cover;
    }

    .user h3{

      font-size:15px;
    }

    .user p{

      font-size:13px;

      color:var(--muted);

      margin-top:2px;
    }

    .syntax{

      padding:8px 12px;

      border-radius:999px;

      background:#f1f1f1;

      font-size:12px;

      font-weight:600;
    }

    .content{

      padding:22px;
    }

    .content h2{

      margin-bottom:14px;

      font-size:22px;
    }

    pre{

      background:#f7f7f7;

      padding:18px;

      border-radius:18px;

      overflow:hidden;

      font-size:13px;

      line-height:1.7;

      font-family:
        'JetBrains Mono',
        monospace;

      max-height:220px;

      white-space:pre-wrap;
    }

    .stats{

      display:flex;

      gap:18px;

      padding:22px;

      border-top:1px solid var(--border);

      color:var(--muted);

      font-size:14px;

      flex-wrap:wrap;
    }

    .open-btn{

      margin:0 22px 22px;

      display:flex;

      align-items:center;

      justify-content:center;

      padding:15px;

      border-radius:18px;

      background:#111;

      color:white;

      text-decoration:none;

      font-weight:600;
    }

    @media(max-width:700px){

      .hero h1{
        font-size:36px;
      }

      body{
        padding:20px 14px;
      }
    }

.load {
  width: 50px;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 8px solid;
  border-color: #000 #0000;
  animation: l1 1s infinite;

  margin:auto;
  
}
@keyframes l1 {to{transform: rotate(.5turn)}}

      .star-btn{

  display:flex;

  align-items:center;

  gap:8px;

  padding:10px 14px;

  border-radius:14px;

  border:1px solid var(--border);

  background:#f7f7f7;

  cursor:pointer;

  transition:.25s ease;
}

.star-btn:hover{

  transform:translateY(-2px);
}

.star-btn.active{

  background:#111;

  color:white;
}
  </style>

</head>

<body>

  <div class="container">

    <div class="hero">

      <h1>
        Explore Pastes
      </h1>

      <p>
        Discover trending snippets,
        ideas and code shared by developers.
      </p>

      <div class="topbar">

        <div class="search">

          <input
            type="text"
            id="searchInput"
            placeholder="Search pastes..."
          >

        </div>

      </div>

    </div>

    <div
      class="grid"
      id="grid"
    >

      <div class="load"></div>
    </div>

  </div>

  <script>

    let allPastes = [];

    async function loadPastes(){

      const response = await fetch(
        "https://pastedb.onrender.com/explore"
      );

      const data = await response.json();

      allPastes = data;

      renderPastes(data);
    }
    function formatTimestamp(timestamp){

  if(!timestamp) return "Unknown";

  const date = new Date(timestamp * 1000);

  return new Intl.DateTimeFormat("en-IN", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  }).format(date);

    }

    function renderPastes(pastes){

      const grid =
        document.getElementById("grid");

      grid.innerHTML = "";
grid.style.display ="grid"
      pastes.forEach(paste => {

        grid.innerHTML += `

          <div class="card">

            <div class="card-top">

              <div class="user">

                <img
                  src="${paste.owner_picture || 'https://www.alaska.edu/_resources/images/placeholders/profile.png'}"
                >

                <div>

                  <h3>
  ${escapeHtml(paste.title)}
</h3>
                  <p>
                    ${formatTimestamp(paste.created_at)|| ""}
                  </p>

                </div>

              </div>

              <div class="syntax">
                ${paste.syntax}
              </div>

            </div>

            <div class="content">

              <h2>
                ${paste.title}
              </h2>

              <pre>${escapeHtml(
                paste.content
              )}</pre>

            </div>

            <div class="stats">

              
              <button
  class="btn star-btn"
  data-id="${paste.id}"
>
  <span class="starIcon">
  ${paste.starred ? "<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
  <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
</svg>
" : "☆"}
</span>
  <span class="starCount">
  ${paste.stars || 0}
</span>
</button>

              <span>
                👁 ${paste.views}
              </span>

              <span>
                📋 ${paste.copies}
              </span>

              <span>
                🔗 ${paste.shares}
              </span>

            </div>

            <a
              href="/paste/${paste.id}"
              class="open-btn"
            >
              Open Paste
            </a>

          </div>

        `;
      });
    }
document.addEventListener(
  "click",
  async (e) => {

    const btn =
      e.target.closest(".star-btn")

    if(!btn) return

    try{

      const pasteId =
        btn.dataset.id

      const response = await fetch(

        `https://pastedb.onrender.com/star/${pasteId}`,

        {
          method:"POST",
          credentials:"include"
        }

      )

      const data =
        await response.json()

      const icon =
        btn.querySelector(".starIcon")

      const count =
        btn.querySelector(".starCount")

      if(data.starred){

        btn.classList.add("active")

        icon.textContent = "⭐"

      }

      else{

        btn.classList.remove("active")

        icon.textContent = "☆"

      }

      count.textContent =
        data.stars

    }

    catch(err){

      console.error(err)

    }

  }
)
    
        function escapeHtml(text){

      const div =
        document.createElement("div");

      div.textContent = text;

      return div.innerHTML;
    }

    document
      .getElementById("searchInput")
      .addEventListener(
        "input",
        e => {

          const q =
            e.target.value.toLowerCase();

          const filtered =
            allPastes.filter(p =>

              p.title
                .toLowerCase()
                .includes(q)

              ||

              p.content
                .toLowerCase()
                .includes(q)

              ||

              p.owner_name
                .toLowerCase()
                .includes(q)
            );

          renderPastes(filtered);
        }
      );

    loadPastes();

  </script>

</body>

  </html>
