
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteDB Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
   button:focus, a:focus {
    outline: none !important;
    box-shadow: none !important;
}

/* ======================
   THEME VARIABLES
====================== */
:root {
  --bg: #ffffff;
  --card: #f5f5f5;
  --text: #000000;
  --muted: #666;
  --border: #e5e5e5;
}

[data-theme="dark"] {
  --bg: #000000;
  --card: #0a0a0a;
  --text: #ffffff;
  --muted: #aaa;
  --border: #1f1f1f;
}

/* ======================
   BASE
====================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}
* {
    -webkit-tap-highlight-color: transparent !important;
}


   
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s ease;
}

/* ======================
   NAVBAR
====================== */
.navbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  align-items: center;z-index:999999999999999999
}

.logo {
  font-weight: 700;
}

/* buttons */
.btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* profile */
.profile {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;border:2px var(--bg) solid
}

/* ======================
   POPUP
====================== */
.popup {
  position: absolute;
  right: 20px;
  top: 60px;
  width: 220px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  display: none;z-index:100000
}

.popup h4 {
  font-size: 14px;
}

.popup p {
  font-size: 12px;
  color: var(--muted);
}

/* ======================
   DASHBOARD
====================== */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(3, 1fr);
}

@media(max-width: 900px){
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width: 600px){
  .grid { grid-template-columns: 1fr; }
}

/* ======================
   CARD
====================== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 14px;
  transition: 0.3s;
}


.title {
  font-weight: 700;
  margin-bottom: 6px;
}

.meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* actions */
.actions {
  display: flex;
  gap: 6px;
}

.action-btn {
  flex: 1;
  padding: 6px;
  font-size: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  color:var(--text);
}

/* ======================
   SHIMMER
====================== */
.shimmer {
  height: 120px;
  border-radius: 12px;
  background: linear-gradient(90deg, #ddd 25%, #eee 50%, #ddd 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* dark shimmer */
[data-theme="dark"] .shimmer {
  background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%);
}

/* ======================
   EMPTY
====================== */
.empty {
  text-align: center;
  margin-top: 80px;
}

   .profile {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  object-fit: cover;
  border: 1px solid var(--border);
   }


.delete-dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);

  display: none;

  justify-content: center;
  align-items: center;

  z-index: 999;
}

.delete-box {
  width: 320px;

  background: var(--card);

  border: 1px solid var(--border);

  border-radius: 16px;

  padding: 18px;
}

.delete-box h3 {
  margin-bottom: 10px;
}

.delete-box p {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}

.delete-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.cancel-btn,
.delete-btn {

  flex: 1;

  padding: 10px;

  border-radius: 10px;

  border: 1px solid var(--border);

  background: transparent;

  color: var(--text);

  cursor: pointer;

  transition: 0.2s;
}

.delete-btn {
  border-color: #444;
}

.delete-btn:hover {
  background: #111;
}

.cancel-btn:hover {
  background: rgba(255,255,255,0.05);
}

/* loader */
.loader {
  width: 16px;
  height: 16px;

  border: 2px solid #666;
  border-top: 2px solid white;

  border-radius: 50%;

  animation: spin 0.8s linear infinite;

  margin: auto;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
     }

      mark{
  background: rgba(120,120,120,0.22);
  color: #eaeaea;

  padding: 2px 5px;

  border-radius: 6px;

  font-weight: 500;

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.02) inset;

  backdrop-filter: blur(4px);
                        }

   
  .search-wrapper{
  position: relative;
  width: 100%;
  max-width: 700px;
  margin: auto;
}

#searchInput{
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  
  background: transparent;

  color: var(--text);

  font-size: 16px;

  outline: none;

  position: relative;

  z-index: 2;

  margin-bottom:15px;
}

.search-wrapper{
  position: relative;display:flex;flex-direction:row
}

.ghost-text{
  position: absolute;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  padding: 14px 16px;

  font-size: 16px;

  white-space: nowrap;

  overflow: hidden;

  pointer-events: none;

  z-index: 1;

  color: transparent;
}

.ghost-text span{
  color: red;z-index:1000
   }
.ghost-text{
  position: absolute;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  padding: 14px 16px;

  font-size: 16px;
  line-height: 24px;

  pointer-events: none;

  white-space: nowrap;
  overflow: hidden;

  z-index: 1;

  color: transparent;
}

.ghost-text span{
  color: rgba(255,255,255,0.32);
}

   #searchInput::placeholder{
  color: var(--muted);
   }

   .paste-badges{
  display:flex;
  align-items:center;
  gap:8px;height:100%;
      justify-content:center;
  margin-top:10px
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;

  padding:5px 10px;

  border-radius:999px;

  font-size:11px;
  font-weight:600;
  letter-spacing:0.2px;

  border:1px solid rgba(255,255,255,0.06);

  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);

  line-height:1;
margin-bottom:3px;
  transition:all .2s ease;
}

.badge svg{
  width:12px;
  height:12px;
  display:block;
}



/* PUBLIC */

.public-badge{
  background:rgba(34,197,94,0.08);
  color:#7ee7a2;
  border-color:rgba(34,197,94,0.14);
}

.public-badge svg{
  stroke:#4ade80;
}



/* PRIVATE */

.private-badge{
  background:rgba(239,68,68,0.08);
  color:#f3a3a3;
  border-color:rgba(239,68,68,0.14);
}

.private-badge svg{
  stroke:#f87171;
}
   

.refresh-btn{

  display:flex;

  align-items:center;

  gap:5px;

  padding:5px;

  border-radius:14px;

  align-self:flex-start;
  margin-top:9px;
border:none;
  background:var(--bg);

  color:var(--text);

  cursor:pointer;
margin-bottom:5px;
  font-weight:600;

  transition:0.25s ease;
}

.refresh-btn:hover{

  transform:translateY(-2px);

  box-shadow:var(--shadow);
}

.refresh-btn svg{

  width:18px;
  height:18px;
}
   .paste-menu-wrapper{
  position:relative;
}


.paste-menu{
  position:absolute;
  top:42px;
  right:0;

  width:160px;

  background:#14171d;
  border:1px solid rgba(255,255,255,0.08);

  border-radius:14px;

  padding:8px;

  display:none;

  flex-direction:column;

  z-index:1000;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35);
}

.paste-menu.show{
  display:flex;
  animation:menuFade 0.18s ease;
}

.paste-menu button{
  border:none;
  background:transparent;
  color:white;

  padding:12px;
  border-radius:10px;

  text-align:left;
  cursor:pointer;

  font-size:14px;

  transition:0.2s;
}

.paste-menu button:hover{
  background:rgba(255,255,255,0.07);
}

@keyframes menuFade{
  from{
    opacity:0;
    transform:translateY(-8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
                    }

     
.bottom-sheet{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  z-index:99999;

  display:flex;
  justify-content:center;
transform:translateY(20px);
  pointer-events:none;
}

.sheet-content{

  width:100%;
  max-width:500px;

  background:var(--card);

  border:1px solid var(--border);

  border-top-left-radius:24px;
  border-top-right-radius:24px;

  padding:18px;

  transform:translateY(420px);

  transition:transform .35s cubic-bezier(.22,.9,.31,1);

  box-shadow:
    0 -10px 40px rgba(0,0,0,0.35);
}

/* SHOW */

.bottom-sheet.show{

  transform:translateY(20px)
}

.bottom-sheet.show .sheet-content{

  transform:translateY(0);
}
/* ACTION BUTTON */
.sheet-btn{

  border:none;

  background:rgba(255,255,255,0.04);

  color:var(--text);

  display:flex;
  align-items:center;
  gap:12px;

  padding:14px;

  border-radius:14px;

  cursor:pointer;

  font-size:15px;
  font-weight:500;

  transition:0.2s ease;
}

.sheet-btn:hover{

  background:rgba(255,255,255,0.08);
}

     /* WRAPPER */

.more-wrapper{
  position:relative;
}

/* DROPDOWN */

.more-dropdown{

  position:absolute;

  top:48px;
  right:0;

  width:180px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:16px;

  padding:8px;

  display:flex;
  flex-direction:column;
  gap:4px;

  opacity:0;
  visibility:hidden;

  transform:translateY(-10px) scale(.98);

  transition:0.22s ease;

  z-index:100;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.25);
}

/* SHOW */

.more-dropdown.show{

  opacity:1;
  visibility:visible;

  transform:translateY(0) scale(1);
}

/* BUTTONS */

.dropdown-btn{

  border:none;

  background:transparent;

  color:var(--text);

  display:flex;
  align-items:center;
  gap:10px;

  width:100%;

  padding:12px;

  border-radius:12px;

  cursor:pointer;

  transition:0.2s ease;

  font-size:14px;
}

.dropdown-btn:hover{

  background:rgba(255,255,255,0.05);
}

   /* MENU BUTTON */

.menu-btn{

  position:fixed;
  top:20px;
  left:20px;

  width:52px;
  height:52px;

  border:none;
  border-radius:16px;

  background:#171a21;
  color:white;

  font-size:22px;
  cursor:pointer;

  z-index:1001;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.3);

  transition:0.25s;
}

.menu-btn:hover{
  transform:scale(1.05);
}

.sidebar{

  position:fixed;
  top:0;
  left:-340px;

  width:320px;
  max-width:85vw;
  height:100vh;

  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  border-right:1px solid var(--border);

  z-index:999999;

  padding:20px;

  display:flex;
  flex-direction:column;

  transition:left .35s cubic-bezier(.22,.9,.31,1);

  box-shadow:
    0 20px 50px rgba(0,0,0,.15);
}

/* DARK MODE */
[data-theme="dark"] .sidebar{

  background:rgba(10,10,10,.88);

  box-shadow:
    0 20px 50px rgba(0,0,0,.5);
}

.sidebar.open{
  left:0;
}

/* HEADER */

.sidebar-header{

  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:25px;
}

.sidebar-header h2{

  color:var(--text);

  font-size:22px;
  font-weight:700;
}

/* CLOSE BUTTON */

.close-btn{

  width:42px;
  height:42px;

  border:none;

  border-radius:14px;

  background:var(--card);

  color:var(--text);

  cursor:pointer;

  font-size:18px;

  transition:.25s;
}

.close-btn:hover{

  transform:rotate(90deg);

  background:var(--border);
}

/* LINKS CONTAINER */

.sidebar-links{

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MENU ITEMS */

.sidebar-item{

  position:relative;

  width:100%;

  border:none;

  background:transparent;

  color:var(--text);

  text-align:left;

  padding:14px 16px;

  border-radius:16px;

  cursor:pointer;

  font-size:15px;
  font-weight:500;

  transition:.25s ease;

  overflow:hidden;
}

.sidebar-item::before{

  content:"";

  position:absolute;

  left:0;
  top:0;

  width:4px;
  height:100%;

  background:linear-gradient(
    180deg,
    #7c3aed,
    #3b82f6
  );

  transform:scaleY(0);

  transition:.25s;
}

.sidebar-item:hover{

  background:var(--card);

  transform:translateX(6px);
}

.sidebar-item:hover::before{

  transform:scaleY(1);
}

/* ACTIVE ITEM */

.sidebar-item.active{

  background:var(--card);

  border:1px solid var(--border);
}

/* OVERLAY */

.overlay{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.45);

  backdrop-filter:blur(3px);

  opacity:0;

  pointer-events:none;

  transition:.3s;

  z-index:999998;
}

.overlay.show{

  opacity:1;

  pointer-events:auto;
}

/* MOBILE */

@media(max-width:600px){

  .sidebar{

    width:290px;
  }

  .sidebar-header h2{

    font-size:20px;
  }

  .sidebar-item{

    padding:15px;
    font-size:14px;
  }
   }


/* OVERLAY */


   .row{display:flex; flex-direction:row}
</style>
</head>

<script>

   const menuBtn =
  document.getElementById("menuBtn");

const sidebar =
  document.getElementById("sidebar");

const closeSidebar =
  document.getElementById("closeSidebar");

const overlay =
  document.getElementById("overlay");

menuBtn.onclick = () => {

  sidebar.classList.add("open");

  overlay.classList.add("show");
};

closeSidebar.onclick = closeMenu;

overlay.onclick = closeMenu;

function closeMenu(){

  sidebar.classList.remove("open");

  overlay.classList.remove("show");
   }
   let currentSearch =""
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
let allPastes = [];
function highlight(text, query){

    if(!query) return text;

    const regex = new RegExp(`(${query})`, "gi");

    return text.replace(
        regex,
        `<mark>$1</mark>`
    );
   }


function escapeHTML(str=""){
    return str
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
}


function renderPastes(pastes){

  // fallback safety
  if(!Array.isArray(pastes)){
    pastes = [];
  }

  // empty state
  if(pastes.length === 0){

    grid.innerHTML = `
      <div class="empty">
        <h2>No pastes found</h2>
      </div>
    `;

    return;
  }

  grid.innerHTML = pastes.map(p => `
    <div class="card">
    <div style="display:flex;flex-direction:row;justify-content:space-between;align-items:center">
    <div>
        <div class="title">
  ${highlight(escapeHTML(p.title) || "Untitled", currentSearch)}
</div>
   <div class="meta">
          ${p.syntax || "text"} • /${p.custom_id|| ""}
        </div>
              </div>
        <div class="paste-badges">

      ${
        p.visibility === "private"
        ? `
          <div class="badge private-badge">

  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M16 11V8a4 4 0 10-8 0v3m-1 0h10a1 1 0 011 1v6a1 1 0 01-1 1H7a1 1 0 01-1-1v-6a1 1 0 011-1z"
    />
  </svg>

  Private

</div>
        `
        : `
          <div class="badge public-badge">

  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M3 12h18M12 3c2.5 2.5 4 5.8 4 9s-1.5 6.5-4 9m0-18c-2.5 2.5-4 5.8-4 9s1.5 6.5 4 9"
    />
  </svg>

  Public

</div>
        `
      }
                              </div>
    </div>
        <div class="actions">
        <button class="action-btn" onclick="window.location.href='/paste/${p.custom_id}'">View</button>
          <button
  class="action-btn"
  onclick="window.location.href='/create.html?edit=${p._id}'"
>
  Edit
</button> <button
  class="action-btn"
  onclick="openDeleteDialog('${p._id}', '${p.title}')"
>
  Delete
</button>
<button
  class="action-btn"

function toggleDropdown(event, id){

  event.stopPropagation();

  // CLOSE OTHER DROPDOWNS
  document
    .querySelectorAll(".more-dropdown")
    .forEach(drop => {

      if(drop.id !== `dropdown-${id}`){
        drop.classList.remove("show");
      }

   });

  const dropdown =
    document.getElementById(`dropdown-${id}`);

  dropdown.classList.toggle("show");
}

/* OUTSIDE CLICK */

document.addEventListener("click", (e)=>{

    .querySelectorAll(".more-dropdown")
    .forEach(drop => {

      // CLOSE ONLY IF CLICKED OUTSIDE
      if(!drop.contains(e.target)){
        drop.classList.remove("show");
      }

    });

});

  document.querySelectorAll('button').forEach(button => {
    button.addEventListener('click', function() {
        this.blur();

});

function toggleTheme(){

function copyText(customId){

  navigator.clipboard.writeText(customId);

  // small UI feedback instead of alert
  const toast = document.createElement("div");
  toast.innerText = "Copied: " + customId;

  toast.style.cssText = `
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 9999;
  `;

  document.body.appendChild(toast);

  setTimeout(() => toast.remove(), 1500);
}

async function loadDashboard() {
  const grid = document.getElementById("grid");

  // show loading state
  grid.innerHTML = Array(6).fill('<div class="shimmer"></div>').join("");

  try {
    const res = await fetch(
       
       `${API_URL}/user/dashboard`, 
       {
      method: "GET",
      credentials: "include",
      
    });
if (res.status === 401) {
  window.location.href = "/login.html";
  return;
}
    
    if (!res.ok) {
      throw new Error("HTTP Error: " + res.status);
    }

    const data = await res.json();

   
    document.getElementById("username").innerText =
      data?.user?.name || "User";

    document.getElementById("email").innerText =
      data?.user?.email || "";

    const profile = document.querySelector(".profile");

    if (data?.user?.picture) {
      profile.src = data.user.picture;
    }

    //  EMPTY STATE
    if (!data.pastes || data.pastes.length === 0) {
      grid.innerHTML = `
        <div class="empty">
  <h2 style="margin-bottom:10px;">No pastes yet</h2>
  <p style="color:var(--muted); margin-bottom:20px;">
    Create your first paste and start sharing code instantly.
  </p>
  <button class="btn">
    <a href="/create" style="text-decoration:none;color:inherit;">
      Create First Paste
    </a>
  </button>
</div>
      `;
      return;
    }

    // RENDER PASTES
    allPastes = data.pastes;
renderPastes(allPastes);

  } catch (err) {
    alert(err);
    grid.innerHTML = "<p>Error loading dashboard</p>";
  }
   }
loadDashboard();

   let deletePasteId = null;

function openDeleteDialog(id, title) {

  deletePasteId = id;

  document.getElementById("deleteText").innerHTML =
    `Are you sure you want to delete <b>${title}</b>?`;

  document.getElementById("deleteDialog").style.display = "flex";
}

function closeDeleteDialog() {

  document.getElementById("deleteDialog").style.display = "none";
}

document
.getElementById("confirmDeleteBtn")
.onclick = async function () {

  const btn = this;

  btn.disabled = true;

  btn.innerHTML = `<div class="loader"></div>`;

  try {

    const res = await fetch(
      `${API_URL}/delete/${deletePasteId}`,
      {
        method: "DELETE",
        credentials: "include"
      }
    );

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "Delete failed");
    }

    closeDeleteDialog();

    loadDashboard();

  } catch (err) {

    alert(err);

  } finally {

    btn.disabled = false;

    btn.innerHTML = "Delete";
  }
};


const searchInput = document.getElementById("searchInput");
const ghostText = document.getElementById("ghostText");

let currentSuggestion = "";

searchInput.addEventListener("input", async (e)=>{

  const value = e.target.value.trim();

  currentSearch = value;

  /* EMPTY INPUT */
  if(!value){

  currentSearch = "";

  ghostText.innerHTML = "";

  currentSuggestion = "";

  await loadDashboard();

  return;
  }

  try{

    /* SEARCH */
    const res = await fetch(
      `${API_URL}/search?q=${encodeURIComponent(value)}`
    );

    const data = await res.json();

    renderPastes(data.results || []);

    /* SUGGESTION */
    const suggestRes = await fetch(
      `${API_URL}/suggest?q=${encodeURIComponent(value)}`
    );

    const suggestData = await suggestRes.json();

    const first = suggestData.suggestions?.[0];

    if(
      first &&
      first.toLowerCase().startsWith(value.toLowerCase())
    ){

      currentSuggestion = first;

      const remaining = first.slice(value.length);

      ghostText.innerHTML =
        value + `<span>${remaining}</span>`;

    }else{

      ghostText.innerHTML = "";

      currentSuggestion = "";
    }

  }catch(err){

    console.log(err);

    renderPastes(allPastes);
  }
});

/* TAB / RIGHT ARROW */
searchInput.addEventListener("keydown", (e)=>{

  if(
    (e.key === "Tab" || e.key === "ArrowRight")
    &&
    currentSuggestion
  ){

    e.preventDefault();

    searchInput.value = currentSuggestion;

    currentSearch = currentSuggestion;

    ghostText.innerHTML = "";

    currentSuggestion = "";

    searchInput.dispatchEvent(
      new Event("input")
    );
  }

  if(e.key === "Enter"){

    ghostText.innerHTML = "";

    currentSuggestion = "";
  }
});
