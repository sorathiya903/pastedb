
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteDB Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ======================
   THEME VARIABLES
====================== */
:root {
  --bg: #ffffff;
  --card: #f5f5f5;
  --text: #000000;
  --muted: #666;
  --border: #e5e5e5;
}

[data-theme="dark"] {
  --bg: #000000;
  --card: #0a0a0a;
  --text: #ffffff;
  --muted: #aaa;
  --border: #1f1f1f;
}

/* ======================
   BASE
====================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s ease;
}

/* ======================
   NAVBAR
====================== */
.navbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  align-items: center;
}

.logo {
  font-weight: 700;
}

/* buttons */
.btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* profile */
.profile {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
}

/* ======================
   POPUP
====================== */
.popup {
  position: absolute;
  right: 20px;
  top: 60px;
  width: 220px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  display: none;
}

.popup h4 {
  font-size: 14px;
}

.popup p {
  font-size: 12px;
  color: var(--muted);
}

/* ======================
   DASHBOARD
====================== */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(3, 1fr);
}

@media(max-width: 900px){
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width: 600px){
  .grid { grid-template-columns: 1fr; }
}

/* ======================
   CARD
====================== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 14px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
}

.title {
  font-weight: 700;
  margin-bottom: 6px;
}

.meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* actions */
.actions {
  display: flex;
  gap: 6px;
}

.action-btn {
  flex: 1;
  padding: 6px;
  font-size: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
}

/* ======================
   SHIMMER
====================== */
.shimmer {
  height: 120px;
  border-radius: 12px;
  background: linear-gradient(90deg, #ddd 25%, #eee 50%, #ddd 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* dark shimmer */
[data-theme="dark"] .shimmer {
  background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%);
}

/* ======================
   EMPTY
====================== */
.empty {
  text-align: center;
  margin-top: 80px;
}

   .profile {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  object-fit: cover;
  border: 1px solid var(--border);
   }


.delete-dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);

  display: none;

  justify-content: center;
  align-items: center;

  z-index: 999;
}

.delete-box {
  width: 320px;

  background: var(--card);

  border: 1px solid var(--border);

  border-radius: 16px;

  padding: 18px;
}

.delete-box h3 {
  margin-bottom: 10px;
}

.delete-box p {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}

.delete-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.cancel-btn,
.delete-btn {

  flex: 1;

  padding: 10px;

  border-radius: 10px;

  border: 1px solid var(--border);

  background: transparent;

  color: var(--text);

  cursor: pointer;

  transition: 0.2s;
}

.delete-btn {
  border-color: #444;
}

.delete-btn:hover {
  background: #111;
}

.cancel-btn:hover {
  background: rgba(255,255,255,0.05);
}

/* loader */
.loader {
  width: 16px;
  height: 16px;

  border: 2px solid #666;
  border-top: 2px solid white;

  border-radius: 50%;

  animation: spin 0.8s linear infinite;

  margin: auto;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
     }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">PasteDB</div>

  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn" onclick="toggleTheme()">Toggle Theme</button>
    
  <img id="profilePic" class="profile" onclick="togglePopup()" />
     
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <h4 id="username">User</h4>
    <p id="email">Email</p>
    <button class="btn" style="margin-top:10px;width:100%">Logout</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container">
   <div style="padding:20px;">
  <input id="searchInput" placeholder="Search pastes..." 
    style="width:100%; padding:12px; border-radius:10px;
    border:1px solid var(--border); background:var(--card); color:var(--text);" />
   </div>
  <div class="grid" id="grid"></div>
</div>


   <!--delete box -->
<div class="delete-dialog" id="deleteDialog">

  <div class="delete-box">

    <h3>Delete Paste</h3>

    <p id="deleteText">
      Are you sure you want to delete this paste?
    </p>

    <div class="delete-actions">

      <button
        class="cancel-btn"
        onclick="closeDeleteDialog()"
      >
        Cancel
      </button>

      <button
        class="delete-btn"
        id="confirmDeleteBtn"
      >
        Delete
      </button>

    </div>

  </div>

</div>
<script>
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
let allPastes = [];

function renderPastes(pastes){
  
  grid.innerHTML = pastes.map(p => `
    <div class="card">
        <div class="title">${p.title || "Untitled"}</div>
        <div class="meta">
          ${p.syntax || "text"} • ${p.created_at || ""}
        </div>
        <div class="actions">
        <button class="action-btn" onclick="copyText('${p._id}')">Copy Content</button>
          <button class="action-btn" onclick="window.location.href='/paste.html?id=${p._id}'">View</button>
          <button
  class="action-btn"
  onclick="window.location.href='/create.html?edit=${p._id}'"
>
  Edit
</button> <button
  class="action-btn"
  onclick="openDeleteDialog('${p._id}', '${p.title}')"
>
  Delete
</button>
</div>
      </div>
  `).join("");
}
/* ======================
   THEME TOGGLE
====================== */
function toggleTheme(){
  const current = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute(
    "data-theme",
    current === "dark" ? "light" : "dark"
  );
}
function copyText(id){
  const paste = allPastes.find(p => p._id === id);
  navigator.clipboard.writeText(paste.content);

  alert("Copied!");
}
/* ======================
   POPUP
====================== */
function togglePopup(){
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function(e) {
      let menu = document.getElementById("popup");
let profile= document.getElementById('profilePic')
    if (!profile.contains(e.target) && !menu.contains(e.target)) {
        menu.style.display = "none";
    }
});




/* ======================
   LOAD DASHBOARD
====================== */
async function loadDashboard() {
  const grid = document.getElementById("grid");

  // show loading state
  grid.innerHTML = Array(6).fill('<div class="shimmer"></div>').join("");

  try {
    const res = await fetch("https://pastedb.onrender.com/user/dashboard", {
      method: "GET",
      credentials: "include", // IMPORTANT for cookie auth
      
    });

    //  handle HTTP errors properly
    if (!res.ok) {
      throw new Error("HTTP Error: " + res.status);
    }

    const data = await res.json();

    // SAFE user access
    document.getElementById("username").innerText =
      data?.user?.name || "User";

    document.getElementById("email").innerText =
      data?.user?.email || "";

    //  PROFILE PIC FIX
    const profile = document.querySelector(".profile");

    if (data?.user?.picture) {
      profile.style.backgroundImage = `url(${data.user.picture})`;
      profile.style.backgroundSize = "cover";
      profile.style.backgroundPosition = "center";
    }

    //  EMPTY STATE
    if (!data.pastes || data.pastes.length === 0) {
      grid.innerHTML = `
        <div class="empty">
  <h2 style="margin-bottom:10px;">No pastes yet</h2>
  <p style="color:var(--muted); margin-bottom:20px;">
    Create your first paste and start sharing code instantly.
  </p>
  <button class="btn">
    <a href="/create" style="text-decoration:none;color:inherit;">
      Create First Paste
    </a>
  </button>
</div>
      `;
      return;
    }

    // RENDER PASTES
    allPastes = data.pastes;
renderPastes(allPastes);

  } catch (err) {
    alert(err);
    grid.innerHTML = "<p>Error loading dashboard</p>";
  }
   }
loadDashboard();

   let deletePasteId = null;

function openDeleteDialog(id, title) {

  deletePasteId = id;

  document.getElementById("deleteText").innerHTML =
    `Are you sure you want to delete <b>${title}</b>?`;

  document.getElementById("deleteDialog").style.display = "flex";
}

function closeDeleteDialog() {

  document.getElementById("deleteDialog").style.display = "none";
}

document
.getElementById("confirmDeleteBtn")
.onclick = async function () {

  const btn = this;

  btn.disabled = true;

  btn.innerHTML = `<div class="loader"></div>`;

  try {

    const res = await fetch(
      `https://pastedb.onrender.com/delete/${deletePasteId}`,
      {
        method: "DELETE",
        credentials: "include"
      }
    );

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "Delete failed");
    }

    closeDeleteDialog();

    loadDashboard();

  } catch (err) {

    alert(err);

  } finally {

    btn.disabled = false;

    btn.innerHTML = "Delete";
  }
};

   
   document.getElementById("searchInput").addEventListener("input", (e)=>{
  const value = e.target.value.toLowerCase();

  const filtered = allPastes.filter(p => {
    return (
      (p.title || "").toLowerCase().includes(value) ||
      (p.content || "").toLowerCase().includes(value) ||
      (p.syntax || "").toLowerCase().includes(value)
    );
  });

  renderPastes(filtered);
});
</script>

</body>
  </html>
