/* ======================
   THEME VARIABLES
====================== */
:root {
  --bg: #ffffff;
  --card: #f5f5f5;
  --text: #000000;
  --muted: #666;
  --border: #e5e5e5;
}

[data-theme="dark"] {
  --bg: #000000;
  --card: #0a0a0a;
  --text: #ffffff;
  --muted: #aaa;
  --border: #1f1f1f;
}

/* ======================
   BASE
====================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}
* {
    -webkit-tap-highlight-color: transparent !important;
}


   
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s ease;
}

/* ======================
   NAVBAR
====================== */
.navbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  align-items: center;z-index:999999999999999999
}

.logo {
  font-weight: 700;
}

/* buttons */
.btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* profile */
.profile {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;border:2px var(--bg) solid
}

/* ======================
   POPUP
====================== */
.popup {
  position: absolute;
  right: 20px;
  top: 60px;
  width: 220px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  display: none;z-index:100000
}

.popup h4 {
  font-size: 14px;
}

.popup p {
  font-size: 12px;
  color: var(--muted);
}

/* ======================
   DASHBOARD
====================== */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(3, 1fr);
}

@media(max-width: 900px){
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width: 600px){
  .grid { grid-template-columns: 1fr; }
}

/* ======================
   CARD
====================== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 14px;
  transition: 0.3s;
}


.title {
  font-weight: 700;
  margin-bottom: 6px;
}

.meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* actions */
.actions {
  display: flex;
  gap: 6px;
}

.action-btn {
  flex: 1;
  padding: 6px;
  font-size: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  color:var(--text);
}

/* ======================
   SHIMMER
====================== */
.shimmer {
  height: 120px;
  border-radius: 12px;
  background: linear-gradient(90deg, #ddd 25%, #eee 50%, #ddd 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* dark shimmer */
[data-theme="dark"] .shimmer {
  background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%);
}

/* ======================

<script>
async function showQRCode(customId) {

    const paste = allPastes.find(
        p => p.custom_id === customId
    );

    let url = `${location.origin}/paste/${customId}`;

    if (paste && paste.visibility === "unlisted") {

        const accountKEK = await getFromDB("accountKEK");

        const rawPEKBase64 = await decryptWithAES(
            paste.encrypted_pek,
            accountKEK
        );

        url += "#" + encodeURIComponent(rawPEKBase64);
    }

    document.getElementById("qrDialog")?.remove();

    const dialog = document.createElement("div");

    dialog.id = "qrDialog";
    dialog.className = "delete-dialog";
    dialog.style.display = "flex";

    dialog.innerHTML = `
        <div class="delete-box">

            <h3>Scan QR Code</h3>

            <canvas id="qrCanvas"
                style="
                    display:block;
                    margin:20px auto;
                    background:white;
                    padding:10px;
                    border-radius:12px;
                ">
            </canvas>

            <div class="delete-actions">

                <button class="cancel-btn">
                    Close
                </button>

            </div><button
    class="delete-btn"
    id="downloadQrBtn"
    style="width:100%;margin-top:10px;"
>
    Download QR
</button>

        </div>
    `;

    document.body.appendChild(dialog);

    await QRCode.toCanvas(
        document.getElementById("qrCanvas"),
        url,
        {
            width: 260,
            margin: 2
        }
    );
   document.getElementById("downloadQrBtn").onclick = () => {

    const canvas = document.getElementById("qrCanvas");

    const a = document.createElement("a");

    a.href = canvas.toDataURL("image/png");

    a.download = `${customId}.png`;

    a.click();
};

    dialog.querySelector(".cancel-btn").onclick = () => dialog.remove();

    dialog.onclick = e => {
        if (e.target === dialog)
            dialog.remove();
    };
}
   const menuBtn =
  document.getElementById("menuBtn");

const sidebar =
  document.getElementById("sidebar");

const closeSidebar =
  document.getElementById("closeSidebar");

const overlay =
  document.getElementById("overlay");

menuBtn.onclick = () => {

  sidebar.classList.add("open");

  overlay.classList.add("show");
};

closeSidebar.onclick = closeMenu;

overlay.onclick = closeMenu;

function highlight(text, query){

    if(!query) return text;

    const regex = new RegExp(`(${query})`, "gi");

    return text.replace(
        regex,
        `<mark>$1</mark>`
    );
   }


function escapeHTML(str=""){
    return str
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
}

function showToast(message, type = "success") {

    const old = document.getElementById("toast");
    if (old) old.remove();

    const toast = document.createElement("div");
    toast.id = "toast";

    const colors = {
        success: {
            bg: "#16a34a",
            border: "#22c55e"
        },
        error: {
            bg: "#dc2626",
            border: "#ef4444"
        },
        info: {
            bg: "#2563eb",
            border: "#3b82f6"
        }
    };

    const color = colors[type] || colors.success;

    toast.textContent = message;

    toast.style.cssText = `
        position:fixed;
        left:50%;
        bottom:24px;
        transform:translate(-50%,100px);
        background:${color.bg};
        border:1px solid ${color.border};
        color:white;
        padding:14px 20px;
        border-radius:14px;
        font-weight:600;
        font-size:14px;
        z-index:999999;
        box-shadow:0 12px 35px rgba(0,0,0,.35);
        transition:all .28s ease;
        opacity:0;
        min-width:220px;
        text-align:center;
    `;

    document.body.appendChild(toast);

    requestAnimationFrame(() => {
        toast.style.transform = "translate(-50%,0)";
        toast.style.opacity = "1";
    });

    setTimeout(() => {

        toast.style.transform = "translate(-50%,100px)";
        toast.style.opacity = "0";

        setTimeout(() => toast.remove(), 300);

    }, 2200);
}

    async function showShareLink(customId) {

    const paste = allPastes.find(
        p => p.custom_id === customId
    );

    const ownerUrl = `${location.origin}/paste/${customId}`;

    let shareUrl = ownerUrl;

    if (paste && paste.visibility === "unlisted") {

        const accountKEK = await getFromDB("accountKEK");

        const rawPEKBase64 = await decryptWithAES(
            paste.encrypted_pek,
            accountKEK
        );

        shareUrl =
            ownerUrl +
            "#" +
            encodeURIComponent(rawPEKBase64);
    }

    document.getElementById("shareDialog")?.remove();

    const dialog = document.createElement("div");

    dialog.className = "delete-dialog";
    dialog.id = "shareDialog";
    dialog.style.display = "flex";

    dialog.innerHTML = `
        <div class="delete-box">

            <h3>Share Paste</h3>

            ${
                paste && paste.visibility === "unlisted"
                ? `
                <p style="margin-top:10px">Owner Link</p>

                <input
                    id="ownerLinkInput"
                    readonly
                    value="${ownerUrl}"
                    style="
                        width:100%;
                        margin-top:8px;
                        padding:10px;
                        border-radius:10px;
                        border:1px solid var(--border);
                        background:var(--bg);
                        color:var(--text);
                    "
                >

                <p style="margin-top:18px">
                    Share Link (for others)
                </p>

                <input
                    id="shareLinkInput"
                    readonly
                    value="${shareUrl}"
                    style="
                        width:100%;
                        margin-top:8px;
                        padding:10px;
                        border-radius:10px;
                        border:1px solid var(--border);
                        background:var(--bg);
                        color:var(--text);
                    "
                >
                `
                : `
                <p style="margin-top:10px">Paste Link</p>

                <input
                    id="shareLinkInput"
                    readonly
                    value="${ownerUrl}"
                    style="
                        width:100%;
                        margin-top:8px;
                        padding:10px;
                        border-radius:10px;
                        border:1px solid var(--border);
                        background:var(--bg);
                        color:var(--text);
                    "
                >
                `
            }

            <div class="delete-actions">

                <button
                    class="cancel-btn"
                    id="closeShareBtn"
                >
                    Close
                </button>

                ${
                    paste && paste.visibility === "unlisted"
                    ? `
                    <button
                        class="delete-btn"
                        id="copyOwnerBtn"
                    >
                        Copy Owner Link
                    </button>

                    <button
                        class="delete-btn"
                        id="copyShareBtn"
                    >
                        Copy Share Link
                    </button>
                    `
                    : `
                    <button
                        class="delete-btn"
                        id="copyShareBtn"
                    >
                        Copy Link
                    </button>
                    `
                }

            </div>

        </div>
    `;

    document.body.appendChild(dialog);

    document.getElementById("closeShareBtn").onclick = () => {
        dialog.remove();
    };

    dialog.onclick = e => {
        if (e.target === dialog) {
            dialog.remove();
        }
    };

    document.getElementById("copyShareBtn").onclick = async () => {

        await navigator.clipboard.writeText(shareUrl);

        showToast("Copied!");
    };

    if (paste && paste.visibility === "unlisted") {

        document.getElementById("copyOwnerBtn").onclick = async () => {

            await navigator.clipboard.writeText(ownerUrl);

            showToast("Copied!");
        };
    }
    }

   
function toggleDropdown(event, id){

  event.stopPropagation();

  // CLOSE OTHER DROPDOWNS
  document
    .querySelectorAll(".more-dropdown")
    .forEach(drop => {

      if(drop.id !== `dropdown-${id}`){
        drop.classList.remove("show");
      }

   });

  const dropdown =
    document.getElementById(`dropdown-${id}`);

  dropdown.classList.toggle("show");
}

async function loadDashboard() {
  const grid = document.getElementById("grid");

  // show loading state
  grid.innerHTML = Array(6).fill('<div class="shimmer"></div>').join("");

  try {
    const res = await fetch(
       
       `${API_URL}/user/dashboard`, 
       {
      method: "GET",
      credentials: "include",
      
    });
if (res.status === 401) {
  window.location.href = "/login.html";
  return;
}
    
    if (!res.ok) {
      throw new Error("HTTP Error: " + res.status);
    }

    const data = await res.json();

   
    document.getElementById("username").innerText =
      data?.user?.name || "User";

    document.getElementById("email").innerText =
      data?.user?.email || "";

    const profile = document.querySelector(".profile");

    if (data?.user?.picture) {
      profile.src = data.user.picture;
    }

    //  EMPTY STATE
    if (!data.pastes || data.pastes.length === 0) {
      grid.innerHTML = `
        <div class="empty">
  <h2 style="margin-bottom:10px;">No pastes yet</h2>
  <p style="color:var(--muted); margin-bottom:20px;">
    Create your first paste and start sharing code instantly.
  </p>
  <button class="btn">
    <a href="/create" style="text-decoration:none;color:inherit;">
      Create First Paste
    </a>
  </button>
</div>
      `;
      return;
    }

    // RENDER PASTES
    allPastes =[]

for (const paste of data.pastes) {

    if (!paste.e2ee) {
        allPastes.push(paste);
        continue;
    }

    try {

        allPastes.push(
            await decryptPasteData(paste)
        );

    } catch (e) {

        console.error(
            "Couldn't decrypt",
            paste.custom_id,
            e
        );

        allPastes.push({
            ...paste,
            title: "[Corrupted Encrypted Paste]",
            content: ""
        });

    }
          }

renderPastes(allPastes);

  } catch (err) {
    alert(err);
    grid.innerHTML = "<p>Error loading dashboard</p>";
  }
   }
loadDashboard();

     showToast("Paste deleted successfully!");

console.log(err)

  } finally {

    btn.innerHTML = "Delete";
  }
};


const searchInput = document.getElementById("searchInput");
const ghostText = document.getElementById("ghostText");

let currentSuggestion = "";

searchInput.addEventListener("input", (e) => {

  const value = e.target.value.trim().toLowerCase();

  currentSearch = value;

  if (!value) {
    renderPastes(allPastes);
    ghostText.innerHTML = "";
    currentSuggestion = "";
    return;
  }

  // Search locally
  const filtered = allPastes.filter(p =>
    (p.title || "").toLowerCase().includes(value) ||
    (p.custom_id || "").toLowerCase().includes(value) ||
    (p.syntax || "").toLowerCase().includes(value)
  );

  renderPastes(filtered);

  // Local autocomplete
  const match = allPastes.find(p =>
    (p.title || "").toLowerCase().startsWith(value)
  );

  if (match) {
    currentSuggestion = match.title;
    ghostText.innerHTML =
      value +
      `<span>${match.title.slice(value.length)}</span>`;
  } else {
    currentSuggestion = "";
    ghostText.innerHTML = "";
  }

});

async function deleteAccount(){

  const confirmDelete = confirm(
    "Delete your account permanently?"
  );

  if(!confirmDelete) return;

  try{

    const res = await fetch(
      `${API_URL}/delete-account`,
      {
        method: "DELETE",
        credentials: "include"
      }
    );

    const data = await res.json();

    if(!res.ok){
      throw new Error(
        data.detail || "Delete failed"
      );
    }

    showToast("Account deleted successfully!");

    window.location.href = "/";

  }catch(err){
    showToast("Unable to delete account", "error"); 

    alert(err.message);
  }
}
