<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PasteDB Study Search</title>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>

<script>

if(
  location.hostname === "localhost" ||

  location.hostname.includes("127.0.0.1") ||

  location.hostname.includes("netlify") ||

  localStorage.getItem("debug") === "true"
){

  eruda.init();

}

</script>
<style>
body{
    font-family:Arial;
    background:#111827;
    color:white;
    margin:0;
    padding:20px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.section{
    margin-top:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#1f2937;
    padding:15px;
    border-radius:15px;
}

.card a{
    color:#60a5fa;
}

.image-card img{
    width:100%;
    border-radius:12px;
    cursor:pointer;
}

.pdf-card{
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    z-index:999;
}

.modal-content{
    position:absolute;
    inset:5%;
    background:white;
}

.modal iframe{
    width:100%;
    height:100%;
    border:none;
}

.close{
    position:absolute;
    top:10px;
    right:20px;
    font-size:30px;
    color:black;
    cursor:pointer;
    z-index:2;
}

#imageModal img{
    max-width:90%;
    max-height:90%;
}

#imageModal{
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<h1>PasteDB Study Search</h1>

<div class="search-box">
    <input
        id="query"
        placeholder="Science NCERT Class 10 Chapter 1 Exercise"
    >

    <button onclick="search()">
        Search
    </button>
</div>

<div class="section">
    <h2>Web Results</h2>

    <div id="web" class="grid"></div>
</div>

<div class="section">
    <h2>PDFs</h2>

    <div id="pdfs" class="grid"></div>
</div>

<div class="section">
    <h2>Images</h2>

    <div id="images" class="grid"></div>
</div>

<div class="modal" id="pdfModal">
    <div class="modal-content">
        <span class="close"
              onclick="closePdf()">
            ×
        </span>

        <iframe id="pdfFrame"></iframe>
    </div>
</div>

<div class="modal"
     id="imageModal">

    <img id="imageViewer">

</div>

<script>
async function search(){

    const q =
        document
        .getElementById("query")
        .value;

    if(!q) return;

    document.getElementById("web")
        .innerHTML="Loading...";

    document.getElementById("pdfs")
        .innerHTML="";

    document.getElementById("images")
        .innerHTML="";

    const res =
        await fetch(
            "https://pastedb.onrender.com/search?q="+
            encodeURIComponent(q)
        );

    const data =
        await res.json();

    renderWeb(data.web||[]);

    renderPdfs(data.pdfs||[]);

    renderImages(data.images||[]);
}

function renderWeb(results){

    document.getElementById("web")
    .innerHTML =
        results.map(r=>`

        <div class="card">

            <h3>${r.title||""}</h3>

            <p>${r.content||""}</p>

            <a href="${r.url}"
               target="_blank">
               Open
            </a>

        </div>

    `).join("");
}

function renderPdfs(results){

    document.getElementById("pdfs")
    .innerHTML =
        results.map(r=>`

        <div class="card pdf-card"
             onclick="openPdf(
                '${r.url}'
             )">

            📄

            <h3>${r.title||""}</h3>

            <p>${r.content||""}</p>

        </div>

    `).join("");
}

function renderImages(results){

    document.getElementById("images")
    .innerHTML =
        results.map(r=>`

        <div class="image-card">

            <img
                src="${r.img_src||r.thumbnail||r.url}"
                onclick="openImage(
                    '${r.img_src||r.url}'
                )"
            >

        </div>

    `).join("");
}

function openPdf(url){

    document
    .getElementById("pdfModal")
    .style.display="block";

    document
    .getElementById("pdfFrame")
    .src=url;
}

function closePdf(){

    document
    .getElementById("pdfModal")
    .style.display="none";

    document
    .getElementById("pdfFrame")
    .src="";
}

function openImage(url){

    document
    .getElementById("imageModal")
    .style.display="flex";

    document
    .getElementById("imageViewer")
    .src=url;
}

document
.getElementById("imageModal")
.onclick=function(){

    this.style.display="none";
};
</script>

</body>
  </html>
