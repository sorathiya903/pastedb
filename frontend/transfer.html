<style>

<div class="box">

<h1>Nearby Transfer</h1>

<p class="subtitle">

Receive public PasteDB pastes from nearby devices.

</p>

</div>

<div class="instruction">

<div class="step">

<span>👆</span>

<div>

<b>Touch devices</b><br>

Hold <b>3 fingers</b> for <b>3 seconds</b>

</div>

</div>

<div class="step">

<span>🖱️</span>

<div>

<b>Desktop</b><br>

Hold the Discover button

</div>

</div>

</div>

<button
id="discoverBtn"
class="discoverBtn">

📡 Become Discoverable

</button>

<div id="statusCard">

<div class="statusDot"></div>

<div>

<div class="statusTitle">

Ready

</div>

<div id="status">

Waiting to become discoverable

</div>

</div>

</div>

<div id="discoverTimer"
style="display:none">

<div class="timerTitle">

Visible for

</div>

<div class="timerValue">

10s

</div>

</div>

<div id="countdown"></div>

<div class="footer">

Only public pastes can be received.

</div>

</div>
<script>

  let ws;

let timer = null;
let connected = false;
let url = "";

const discoverBtn = document.getElementById("discoverBtn");
const status = document.getElementById("status");
const statusDot = document.querySelector(".statusDot");
const statusTitle = document.querySelector(".statusTitle");

const timerBox =
document.getElementById("discoverTimer");

const timerValue =
timerBox.querySelector(".timerValue");

let visibleInterval;

function connect(){

    ws = new WebSocket(
        WS_URL + "/ws/nearby?role=receiver"
    );

    ws.onopen = () => {

        console.log("Connected");

        status.textContent =
        "Ready to become discoverable";

    };

    ws.onerror = e => {

        console.error(e);

    };

    ws.onclose = () => {

        connected = false;

        statusDot.style.background = "#ef4444";

        statusTitle.textContent =
        "Disconnected";

        status.textContent =
        "Reconnecting...";

        discoverBtn.disabled = true;

        setTimeout(connect,2000);

    };

    ws.onmessage = e => {

        const data =
        JSON.parse(e.data);

        if(data.type==="registered"){

            connected = true;

            discoverBtn.disabled = false;

            discoverBtn.style.display="none";

            statusDot.style.background="#22c55e";

            statusTitle.textContent=
            "Discoverable";

            status.textContent=
            "Waiting for nearby sender...";

            timerBox.style.display="block";

            let sec=10;

            timerValue.textContent=
            sec+"s";

            clearInterval(visibleInterval);

            visibleInterval=
            setInterval(()=>{

                sec--;

                timerValue.textContent=
                sec+"s";

                if(sec<=0){

                    clearInterval(
                        visibleInterval
                    );

                    timerBox.style.display=
                    "none";

                    connected=false;

                    discoverBtn.style.display=
                    "block";

                    discoverBtn.textContent=
                    "📡 Become Discoverable";

                    statusDot.style.background=
                    "#888";

                    statusTitle.textContent=
                    "Ready";

                    status.textContent=
                    "Waiting to become discoverable";

                }

            },1000);

        }

        else if(data.type==="incoming"){

            navigator.vibrate?.(
                [200,100,200]
            );

            url=data.url;

            startCountdown();

        }

    };

}

connect();

function registerReceiver(){

    discoverBtn.textContent=
    "Registering...";

    discoverBtn.disabled=true;

    navigator.geolocation.getCurrentPosition(

        pos=>{

            ws.send(JSON.stringify({

                action:"register",

                lat:pos.coords.latitude,

                lon:pos.coords.longitude

            }));

        },

        ()=>{

            ws.send(JSON.stringify({

                action:"register",

                lat:null,

                lon:null

            }));

        }

    );

}

let holdInterval;

function startHold(){

    if(connected) return;

    let sec=3;

    discoverBtn.textContent=
    "Hold "+sec+"s";

    holdInterval=setInterval(()=>{

        sec--;

        if(sec>0){

            discoverBtn.textContent=
            "Hold "+sec+"s";

        }

    },1000);

    timer=setTimeout(()=>{

        clearInterval(holdInterval);

        registerReceiver();

    },3000);

}

function stopHold(){

    clearTimeout(timer);

    clearInterval(holdInterval);

    if(!connected){

        discoverBtn.textContent=
        "📡 Become Discoverable";

    }

}

discoverBtn.addEventListener(
"mousedown",
startHold
);

discoverBtn.addEventListener(
"mouseup",
stopHold
);

discoverBtn.addEventListener(
"mouseleave",
stopHold
);

discoverBtn.addEventListener(
"touchstart",
e=>{

    e.preventDefault();

    startHold();

},
{passive:false}
);

discoverBtn.addEventListener(
"touchend",
stopHold
);

discoverBtn.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

document.addEventListener(
"touchstart",
e=>{

    if(e.touches.length===3){

        startHold();

    }

},
{passive:false}
);

document.addEventListener(
"touchend",
stopHold
);

function startCountdown(){

    let n=3;

    const el=
    document.getElementById("countdown");

    el.style.display="block";

    statusTitle.textContent=
    "Incoming Paste";

    status.textContent=
    "Opening...";

    el.textContent=n;

    const i=setInterval(()=>{

        n--;

        el.textContent=n;

        if(n<=0){

            clearInterval(i);

            location.href=url;

        }

    },1000);

      }
</script>
