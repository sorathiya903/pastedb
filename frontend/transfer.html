<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script src="config.js"></script>
<script>

if(
  debug
){

  eruda.init();

}

</script>
<title>PasteDB Transfer</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
max-width:420px;
width:92%;
background:#1a1a1a;
border:1px solid #333;
border-radius:28px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.hero{
text-align:center;
margin-bottom:24px;
}

.phone{
position:relative;
width:90px;
height:90px;
margin:auto;
font-size:55px;
display:flex;
justify-content:center;
align-items:center;
}

.ripple{
position:absolute;
border:2px solid #3b82f6;
border-radius:50%;
opacity:0;
animation:ripple 2.5s infinite;
}

.ripple1{
width:90px;
height:90px;
}

.ripple2{
width:90px;
height:90px;
animation-delay:.8s;
}

.ripple3{
width:90px;
height:90px;
animation-delay:1.6s;
}

@keyframes ripple{

0%{
transform:scale(1);
opacity:.7;
}

100%{
transform:scale(2.2);
opacity:0;
}

}

h1{
margin:18px 0 8px;
font-size:30px;
}

.subtitle{
color:#aaa;
line-height:1.6;
margin-bottom:10px;
}

.instruction{
background:#202020;
border-radius:18px;
padding:18px;
margin:20px 0;
}

.step{
display:flex;
gap:14px;
align-items:center;
margin-bottom:16px;
text-align:left;
}

.step:last-child{
margin-bottom:0;
}

.step span{
font-size:28px;
}

.discoverBtn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#2563eb;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.25s;
margin-bottom:18px;
}

.discoverBtn:hover{
transform:translateY(-2px);
background:#1d4ed8;
}

#statusCard{
display:flex;
align-items:center;
gap:14px;
background:#202020;
padding:18px;
border-radius:18px;
text-align:left;
}

.statusDot{
width:14px;
height:14px;
border-radius:50%;
background:#888;
}

.statusTitle{
font-weight:bold;
margin-bottom:4px;
}

#status{
color:#bbb;
margin:0;
}

#discoverTimer{
margin-top:18px;
padding:14px;
background:#202020;
border-radius:16px;
}

.timerTitle{
font-size:14px;
color:#999;
}

.timerValue{
font-size:30px;
font-weight:bold;
margin-top:4px;
}

#countdown{
font-size:72px;
font-weight:bold;
margin-top:24px;
display:none;
}

.footer{
margin-top:24px;
color:#777;
font-size:13px;
line-height:1.5;
}
</style>

</head>
<body>

<div class="box">

<div class="hero">

<div class="phone">

📱

<div class="ripple ripple1"></div>
<div class="ripple ripple2"></div>
<div class="ripple ripple3"></div>

</div>

<h1>Nearby Transfer</h1>

<p class="subtitle">

Receive public PasteDB pastes from nearby devices.

</p>

</div>

<div class="instruction">

<div class="step">

<span>👆</span>

<div>

<b>Touch devices</b><br>

Hold <b>3 fingers</b> for <b>3 seconds</b>

</div>

</div>

<div class="step">

<span>🖱️</span>

<div>

<b>Desktop</b><br>

Hold the Discover button

</div>

</div>

</div>

<button
id="discoverBtn"
class="discoverBtn">

📡 Become Discoverable

</button>

<div id="statusCard">

<div class="statusDot"></div>

<div>

<div class="statusTitle">

Ready

</div>

<div id="status">

Waiting to become discoverable

</div>

</div>

</div>

<div id="discoverTimer"
style="display:none">

<div class="timerTitle">

Visible for

</div>

<div class="timerValue">

10s

</div>

</div>

<div id="countdown"></div>

<div class="footer">

Only public pastes can be received.

</div>

</div>
<script>

  let ws;

let timer=null;

let connected=false;

let url="";
  
 

function connect(){
ws = new WebSocket(
    
    WS_URL +
    "/ws/nearby?role=receiver"
);

ws.onopen = () => {
    console.log("WebSocket connected");
};

ws.onerror = (e) => {
    console.log("WebSocket error", e);
};

ws.onclose = (e) => {
    console.log("WebSocket closed", e.code, e.reason);
};

ws.onmessage = (e) => {
    console.log("Received:", e.data);

    const data = JSON.parse(e.data);

    if(data.type==="registered"){

    connected=true;

    document.querySelector(".statusDot").style.background="#22c55e";

    document.querySelector(".statusTitle").textContent=
    "Discoverable";

    document.getElementById("status").textContent=
    "Waiting for nearby sender...";

    discoverBtn.style.display="none";

    const timerBox=
    document.getElementById("discoverTimer");

    timerBox.style.display="block";

    visibleTime=10;

    timerBox.querySelector(".timerValue").textContent=
    visibleTime+"s";

    clearInterval(visibleInterval);

    visibleInterval=setInterval(()=>{

        visibleTime--;

        timerBox.querySelector(".timerValue").textContent=
        visibleTime+"s";

        if(visibleTime<=0){

            clearInterval(visibleInterval);

            timerBox.style.display="none";

            connected=false;

            discoverBtn.style.display="block";

            document.querySelector(".statusDot").style.background="#888";

            document.querySelector(".statusTitle").textContent=
            "Ready";

            document.getElementById("status").textContent=
            "Waiting to become discoverable";

        }

    },1000);

    }
    if (data.type === "incoming") {
        navigator.vibrate?.([200,100,200]);
        url = data.url;
        startCountdown();
    }
}

}

connect();




const discoverBtn =
document.getElementById("discoverBtn");

let visibleInterval;
let visibleTime = 10;

function registerReceiver(){

    navigator.geolocation.getCurrentPosition(

        pos=>{

            ws.send(JSON.stringify({

                action:"register",

                lat:pos.coords.latitude,

                lon:pos.coords.longitude

            }));

        },

        ()=>{

            ws.send(JSON.stringify({

                action:"register",

                lat:null,

                lon:null

            }));

        }

    );

}

function startHold(){

    if(connected) return;

    timer = setTimeout(registerReceiver,3000);

}

function stopHold(){

    clearTimeout(timer);

}

// Desktop

discoverBtn.addEventListener(
    "mousedown",
    startHold
);

discoverBtn.addEventListener(
    "mouseup",
    stopHold
);

discoverBtn.addEventListener(
    "mouseleave",
    stopHold
);

// Mobile button

discoverBtn.addEventListener(
    "touchstart",
    startHold
);

discoverBtn.addEventListener(
    "touchend",
    stopHold
);

// 3-finger gesture

document.addEventListener(
    "touchstart",
    e=>{

        if(e.touches.length===3){

            startHold();

        }

    }
);

document.addEventListener(
    "touchend",
    stopHold
);
function startCountdown(){

    let n=3;

    const el=document.getElementById("countdown");

    el.style.display="block";

    document.getElementById("status").textContent=
    "Incoming paste";

    el.textContent=n;

    const i=setInterval(()=>{

        n--;

        el.textContent=n;

        if(n===0){

            clearInterval(i);

            location.href=url;

        }

    },1000);

}

</script>

</body>
</html>
